<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>RPM 수학 학습</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
  const firebaseConfig = {
    apiKey: "AIzaSyARHy35Dd2n0Fw1sUs-U4zY0BY9WVneMJ4",
    authDomain: "rpm-57f1a.firebaseapp.com",
    projectId: "rpm-57f1a",
    storageBucket: "rpm-57f1a.firebasestorage.app",
    messagingSenderId: "681087068656",
    appId: "1:681087068656:web:68c9d3ef6df32dceb89535"
  };
  const app=initializeApp(firebaseConfig);
  const auth=getAuth(app);
  const db=getFirestore(app);
  window._fb={auth,db,signInWithEmailAndPassword,signOut,onAuthStateChanged,
    doc,getDoc,setDoc,serverTimestamp};
</script>
<style>
:root{
  --bg:#F0F3F8;--surface:#fff;--dark:#1A1D2E;--navy:#252A4A;
  --primary:#FF4D1C;--green:#26D07C;--red:#FF3B5C;--gold:#FFB800;
  --muted:#8B95A7;--border:#E8ECF4;--r:14px;
  --shadow:0 4px 20px rgba(26,29,46,0.08);
  --shadow-sm:0 2px 8px rgba(26,29,46,0.06);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:'Noto Sans KR',sans-serif;color:var(--dark);background:var(--bg);}
#app{display:flex;flex-direction:column;height:100%;overflow:hidden;}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.scroll::-webkit-scrollbar{width:3px;}
.scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* TOP BAR */
.topbar{background:var(--dark);padding:0 14px;display:flex;align-items:center;
  justify-content:space-between;height:50px;flex-shrink:0;box-shadow:0 2px 12px rgba(0,0,0,.25);z-index:50;}
.tbar-logo{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--primary);letter-spacing:2px;}
.tbar-right{display:flex;align-items:center;gap:7px;}
.pill{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);
  border-radius:20px;padding:3px 8px;font-size:11px;color:white;display:flex;align-items:center;gap:3px;}
.pill b{color:var(--gold);}
.tbar-name{font-size:11px;color:rgba(255,255,255,.5);}
.logout-btn{background:none;border:1px solid rgba(255,255,255,.18);border-radius:7px;
  padding:4px 8px;color:rgba(255,255,255,.55);font-size:11px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}

/* BOTTOM NAV */
.bnav{background:var(--surface);border-top:1px solid var(--border);display:flex;flex-shrink:0;box-shadow:0 -4px 16px rgba(0,0,0,.05);}
.bn{flex:1;border:none;background:none;cursor:pointer;padding:8px 4px 6px;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  font-family:'Noto Sans KR',sans-serif;font-size:10px;color:var(--muted);transition:color .2s;}
.bn .ico{font-size:19px;transition:transform .2s;}
.bn.on{color:var(--primary);}
.bn.on .ico{transform:scale(1.1);}

/* SCREENS */
.screen{display:none;padding:12px;animation:fadeIn .2s ease;}
.screen.on{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

/* LOGIN */
#s-login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;padding:32px 20px;}
.login-card{width:100%;max-width:360px;background:var(--surface);border-radius:20px;padding:30px 26px;box-shadow:var(--shadow);}
.login-logo{text-align:center;margin-bottom:22px;}
.login-logo .big{font-family:'Bebas Neue',sans-serif;font-size:44px;color:var(--primary);letter-spacing:4px;}
.login-logo .sub{font-size:12px;color:var(--muted);}
.lfield{margin-bottom:11px;}
.lfield label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;}
.linput{width:100%;border:2px solid var(--border);border-radius:9px;padding:11px 13px;
  font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .2s;}
.linput:focus{border-color:var(--primary);}
.lbtn{width:100%;background:var(--primary);color:white;border:none;border-radius:9px;
  padding:12px;font-size:15px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;margin-top:4px;}
.lerr{font-size:12px;color:var(--red);margin-top:7px;text-align:center;}

/* HOME */
.home-banner{background:linear-gradient(135deg,var(--dark),var(--navy));border-radius:var(--r);
  padding:16px;margin-bottom:11px;color:white;position:relative;overflow:hidden;}
.home-banner::before{content:'RPM';position:absolute;right:-8px;top:-6px;
  font-family:'Bebas Neue',sans-serif;font-size:100px;color:rgba(255,255,255,.04);line-height:1;pointer-events:none;}
.hb-name{font-size:12px;color:rgba(255,255,255,.55);margin-bottom:2px;}
.hb-title{font-size:17px;font-weight:900;}
.hb-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:11px;}
.hb-stat{background:rgba(255,255,255,.08);border-radius:8px;padding:8px;text-align:center;}
.hb-stat .n{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--orange);line-height:1;}
.hb-stat .l{font-size:9px;color:rgba(255,255,255,.4);margin-top:1px;}
.sec-title{font-size:13px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:7px;}
.sec-title::before{content:'';width:3px;height:15px;background:var(--primary);border-radius:2px;}
.unit-grid{display:flex;flex-direction:column;gap:6px;}
.unit-card{background:var(--surface);border-radius:var(--r);padding:11px 13px;
  display:flex;align-items:center;gap:11px;cursor:pointer;border:2px solid transparent;
  box-shadow:var(--shadow-sm);transition:all .2s;}
.unit-card:active{transform:scale(.98);}
.ubadge{width:40px;height:40px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:16px;color:white;background:var(--unit-c);}
.uinfo{flex:1;min-width:0;}
.uname{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.urange{font-size:10px;color:var(--muted);margin-top:1px;}
.ubar{height:3px;background:var(--bg);border-radius:2px;margin-top:5px;overflow:hidden;}
.ubar-fill{height:100%;border-radius:2px;background:var(--unit-c);transition:width .5s;}
.uright{text-align:right;flex-shrink:0;}
.upct{font-size:12px;font-weight:700;color:var(--unit-c);}
.ucnt{font-size:10px;color:var(--muted);margin-top:1px;}

/* QUIZ */
.quiz-header{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
.back-btn{width:32px;height:32px;border:none;background:var(--surface);border-radius:8px;
  cursor:pointer;font-size:15px;flex-shrink:0;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm);}
.quiz-title{font-size:12px;font-weight:700;flex:1;}
.quiz-counter{font-size:11px;color:var(--muted);white-space:nowrap;}
.progbar{height:5px;background:var(--border);border-radius:3px;margin-bottom:10px;overflow:hidden;}
.progfill{height:100%;background:linear-gradient(90deg,var(--primary),var(--gold));border-radius:3px;transition:width .35s;}

/* 문제 카드 */
.qcard{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;margin-bottom:10px;}
.qcard-top{background:linear-gradient(135deg,var(--dark),var(--navy));
  padding:16px 18px;display:flex;justify-content:space-between;align-items:flex-end;}
.qnum-display{font-family:'Bebas Neue',sans-serif;font-size:72px;color:white;line-height:.9;}
.qnum-sub{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:5px;padding-bottom:4px;}
.qtag{font-size:10px;color:rgba(255,255,255,.5);background:rgba(255,255,255,.09);
  border-radius:5px;padding:2px 7px;}
.qunit-tag{font-size:11px;color:rgba(255,255,255,.75);font-weight:600;max-width:120px;text-align:right;line-height:1.3;}

/* 답 입력 */
.ans-wrap{padding:13px 14px 14px;}
.ans-label{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:8px;letter-spacing:.4px;}

/* 탭 */
.type-tabs{display:flex;gap:5px;margin-bottom:10px;}
.type-tab{padding:6px 14px;border-radius:7px;border:1px solid var(--border);
  font-size:12px;font-weight:600;cursor:pointer;background:white;
  font-family:'Noto Sans KR',sans-serif;transition:all .15s;color:var(--muted);}
.type-tab.on{background:var(--primary);color:white;border-color:var(--primary);}

/* 객관식 */
.choice-row{display:flex;gap:6px;margin-bottom:6px;}
.choice-btn{flex:1;padding:13px 2px;border:2px solid var(--border);border-radius:10px;
  background:white;font-size:18px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;
  transition:all .15s;font-weight:700;}
.choice-btn:active{transform:scale(.94);}
.choice-btn.selected{border-color:var(--primary);background:#FFF3F0;color:var(--primary);}
.choice-btn.correct{border-color:var(--green);background:#EDFFF5;color:#1A6640;}
.choice-btn.wrong{border-color:var(--red);background:#FFF5F7;color:var(--red);}

/* 수식 디스플레이 */
.math-display{min-height:50px;border:2px solid var(--border);border-radius:10px;
  padding:11px 13px;font-size:18px;background:white;margin-bottom:8px;
  display:flex;align-items:center;flex-wrap:wrap;cursor:text;
  transition:border-color .2s;position:relative;letter-spacing:1px;}
.math-display.focus{border-color:var(--primary);}
.math-display.ok{border-color:var(--green);background:#F0FFF7;}
.math-display.ng{border-color:var(--red);background:#FFF5F7;}
.cursor{display:inline-block;width:2px;height:22px;background:var(--primary);
  animation:blink .8s infinite;vertical-align:middle;margin:0 1px;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.math-placeholder{color:var(--muted);font-size:13px;font-style:italic;}

/* 수식 키보드 */
.mathkb{background:#F0F3F8;border-radius:10px;padding:7px;margin-bottom:7px;}
.kb-section{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.5px;
  padding:2px 2px 4px;text-transform:uppercase;}
.kb-row{display:flex;gap:4px;margin-bottom:4px;}
.kb-row:last-child{margin-bottom:0;}
.kb-btn{flex:1;padding:9px 2px;border:1px solid #DDE1EC;border-radius:6px;
  background:white;font-size:14px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;
  transition:all .1s;text-align:center;font-weight:600;color:var(--dark);min-width:0;
  box-shadow:0 1px 3px rgba(0,0,0,.06);}
.kb-btn:active{background:var(--primary);color:white;transform:scale(.93);}
.kb-btn.op{background:#EFF6FF;color:#1E40AF;border-color:#C7D9F8;}
.kb-btn.fn{background:#F5F0FF;color:#5B21B6;border-color:#DDD6FE;}
.kb-btn.del{background:#FFF5F7;color:var(--red);border-color:#FFD0DA;}
.kb-btn.go{background:var(--primary);color:white;border-color:var(--primary);flex:2;font-size:13px;}

/* 결과 */
.result{display:none;margin-top:8px;border-radius:9px;padding:11px 13px;}
.result.show{display:flex;gap:8px;align-items:flex-start;}
.result.ok{background:#EDFFF5;border:1px solid #B2F5D0;}
.result.ng{background:#FFF5F7;border:1px solid #FFD0DA;}
.r-icon{font-size:21px;flex-shrink:0;}
.r-title{font-size:13px;font-weight:700;margin-bottom:2px;}
.r-ans{font-size:12px;color:var(--muted);}
.r-ans b{color:var(--green);}
.yt-btn{display:flex;align-items:center;gap:6px;background:#FF0000;color:white;
  border:none;border-radius:7px;padding:8px 13px;margin-top:7px;
  font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:700;
  cursor:pointer;text-decoration:none;width:fit-content;}

/* 이전/다음 */
.qnav{display:flex;gap:6px;padding:0 14px 13px;}
.qnav-btn{flex:1;padding:11px;border-radius:9px;border:none;
  font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.qnav-prev{background:var(--border);color:var(--dark);}
.qnav-next{background:var(--primary);color:white;}

/* FAB + SHEET */
.fab{position:fixed;bottom:66px;right:12px;z-index:99;width:46px;height:46px;border-radius:50%;
  background:var(--primary);color:white;border:none;font-size:18px;cursor:pointer;
  display:none;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(255,77,28,.4);}
.fab.show{display:flex;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;}
.overlay.show{display:flex;}
.sheet{background:var(--surface);border-radius:18px 18px 0 0;width:100%;
  max-height:68vh;display:flex;flex-direction:column;animation:slideUp .22s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-head{padding:11px 15px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.sheet-head h3{font-size:13px;font-weight:700;}
.sheet-close{width:24px;height:24px;border:none;background:var(--border);border-radius:50%;cursor:pointer;font-size:12px;}
.sheet-body{overflow-y:auto;padding:9px;flex:1;}
.qgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;}
.qg-btn{aspect-ratio:1;border-radius:7px;border:none;cursor:pointer;font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;transition:all .1s;}
.qg-btn.un{background:var(--border);color:var(--dark);}
.qg-btn.ok{background:#B2F5D0;color:#1A6640;}
.qg-btn.ng{background:#FFD0DA;color:#8B1A2E;}
.qg-btn.cur{outline:2px solid var(--primary);outline-offset:1px;}

/* WRONG */
.wrong-banner{background:linear-gradient(135deg,#8B1A2E,var(--red));border-radius:var(--r);
  padding:13px;margin-bottom:11px;color:white;}
.wrong-list{display:flex;flex-direction:column;gap:6px;}
.wi{background:var(--surface);border-radius:10px;border-left:4px solid var(--red);padding:11px 13px;box-shadow:var(--shadow-sm);}
.wi-top{display:flex;justify-content:space-between;margin-bottom:5px;}
.wi-num{font-size:13px;font-weight:700;color:var(--red);}
.wi-unit{font-size:10px;color:var(--muted);}
.wi-ans{font-size:12px;margin-bottom:8px;}
.wi-ans .m{color:var(--red);font-weight:600;}
.wi-ans .c{color:var(--green);font-weight:600;}
.wi-btns{display:flex;gap:5px;}
.wibtn{padding:5px 10px;border-radius:6px;border:none;font-family:'Noto Sans KR',sans-serif;
  font-size:11px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:3px;}
.wibtn-yt{background:var(--red);color:white;}
.wibtn-retry{background:var(--border);color:var(--dark);}

/* STATS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:11px;}
.scard{background:var(--surface);border-radius:var(--r);padding:13px;text-align:center;box-shadow:var(--shadow-sm);}
.scard .sn{font-family:'Bebas Neue',sans-serif;font-size:38px;line-height:1;}
.scard .sl{font-size:10px;color:var(--muted);margin-top:1px;}
.ustat-list{display:flex;flex-direction:column;gap:5px;}
.ustat{background:var(--surface);border-radius:8px;padding:10px 12px;box-shadow:var(--shadow-sm);}
.ustat-top{display:flex;justify-content:space-between;font-size:11px;font-weight:600;margin-bottom:5px;}
.ustat-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.ustat-fill{height:100%;border-radius:2px;}
.empty{text-align:center;padding:38px 20px;color:var(--muted);}
.empty .ei{font-size:40px;margin-bottom:9px;}

/* PC */
@media(min-width:768px){
  #app{flex-direction:row;}
  .topbar{display:none;}
  .bnav{flex-direction:column;width:72px;height:100%;border-top:none;border-right:1px solid var(--border);padding:16px 0;}
  .bn{padding:11px 4px;font-size:9px;}
  .bn .ico{font-size:21px;}
  .screen{max-width:660px;margin:0 auto;padding:20px;}
  .fab{bottom:20px;}
  .bnav::before{content:'RPM';font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--primary);
    letter-spacing:2px;display:block;text-align:center;padding:0 0 16px;
    border-bottom:1px solid var(--border);margin-bottom:8px;}
}
</style>
</head>
<body>
<div id="app" style="display:none;">

  <div class="topbar">
    <div class="tbar-logo">RPM 数学</div>
    <div class="tbar-right">
      <div class="pill">✅ <b id="hc">0</b></div>
      <div class="pill">❌ <b id="hw">0</b></div>
      <div class="tbar-name" id="tbarName"></div>
      <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <div class="scroll" id="scrollEl">

    <!-- LOGIN -->
    <div id="s-login" style="display:none;">
      <div class="login-card">
        <div class="login-logo">
          <div class="big">RPM</div>
          <div class="sub">공통수학 1 · 학습 시스템</div>
        </div>
        <div class="lfield"><label>이메일</label>
          <input class="linput" type="email" id="lemail" placeholder="student@school.com"></div>
        <div class="lfield"><label>비밀번호</label>
          <input class="linput" type="password" id="lpassword" placeholder="비밀번호"
            onkeydown="if(event.key==='Enter')doLogin()"></div>
        <button class="lbtn" onclick="doLogin()">로그인</button>
        <div class="lerr" id="lerr"></div>
      </div>
    </div>

    <!-- HOME -->
    <div class="screen on" id="s-home">
      <div class="home-banner">
        <div class="hb-name" id="hbName">안녕하세요</div>
        <div class="hb-title">오늘도 열심히! 📚</div>
        <div class="hb-stats">
          <div class="hb-stat"><div class="n" id="hs-tot">0</div><div class="l">총 풀이</div></div>
          <div class="hb-stat"><div class="n" id="hs-ok">0</div><div class="l">정답</div></div>
          <div class="hb-stat"><div class="n" id="hs-ng">0</div><div class="l">오답</div></div>
          <div class="hb-stat"><div class="n" id="hs-rt">-</div><div class="l">정답률</div></div>
        </div>
      </div>
      <div class="sec-title">단원 선택</div>
      <div class="unit-grid" id="unitGrid"></div>
    </div>

    <!-- QUIZ -->
    <div class="screen" id="s-quiz">
      <div class="quiz-header">
        <button class="back-btn" onclick="goHome()">←</button>
        <div class="quiz-title" id="qUnitTitle">단원</div>
        <div class="quiz-counter" id="qCounter">1/1</div>
      </div>
      <div class="progbar"><div class="progfill" id="progFill" style="width:0%"></div></div>

      <div class="qcard">
        <!-- 문항번호 크게 -->
        <div class="qcard-top">
          <div class="qnum-display" id="qNumLbl">0001</div>
          <div class="qnum-sub">
            <span class="qtag" id="qTypeTag">기본</span>
            <span class="qunit-tag" id="qUnitTag"></span>
          </div>
        </div>

        <div class="ans-wrap">
          <div class="ans-label">📝 답 입력</div>

          <!-- 답 유형 탭 -->
          <div class="type-tabs">
            <button class="type-tab on" id="tab-obj" onclick="setType('obj')">① 객관식</button>
            <button class="type-tab" id="tab-sub" onclick="setType('sub')">✏ 주관식</button>
          </div>

          <!-- 객관식 -->
          <div id="obj-area">
            <div class="choice-row">
              <button class="choice-btn" data-v="①" onclick="selectChoice(this)">①</button>
              <button class="choice-btn" data-v="②" onclick="selectChoice(this)">②</button>
              <button class="choice-btn" data-v="③" onclick="selectChoice(this)">③</button>
              <button class="choice-btn" data-v="④" onclick="selectChoice(this)">④</button>
              <button class="choice-btn" data-v="⑤" onclick="selectChoice(this)">⑤</button>
            </div>
          </div>

          <!-- 주관식 수식 입력기 -->
          <div id="sub-area" style="display:none;">
            <div class="math-display" id="mathDisplay">

    await signInWithEmailAndPassword(auth,em,pw);
  }catch(e){ document.getElementById('lerr').textContent='이메일 또는 비밀번호가 올바르지 않습니다.'; }
}
async function doLogout(){const {auth,signOut}=window._fb;await signOut(auth);location.reload();}

window.addEventListener('load',()=>{
  const {auth,onAuthStateChanged,db,doc,getDoc}=window._fb;
  onAuthStateChanged(auth,async user=>{
    if(!user){
      document.getElementById('s-login').style.display='flex';
      document.getElementById('app').style.display='none';
      return;
    }
    curUser=user;
    document.getElementById('s-login').style.display='none';
    document.getElementById('app').style.display='flex';
    document.getElementById('tbarName').textContent=user.displayName||user.email.split('@')[0];
    document.getElementById('hbName').textContent=`${user.displayName||user.email.split('@')[0]}님, 안녕하세요!`;
    await loadRecords();
    try{
      const snap=await getDoc(doc(db,'settings','youtube'));
      if(snap.exists()) YT_CHANNEL_ID=snap.data().channelId||'';
    }catch(e){}
    renderHome(); updateHeader();
  });
});

async function loadRecords(){
  const {db,doc,getDoc}=window._fb;
  try{
    const snap=await getDoc(doc(db,'students',curUser.uid,'data','records'));
    records=snap.exists()?(snap.data().records||{}):{};
  }catch(e){records={};}
}
async function saveRecord(n,rec){
  const {db,doc,setDoc,serverTimestamp}=window._fb;
  records[n]=rec;
  try{
    await setDoc(doc(db,'students',curUser.uid,'data','records'),
      {records,updatedAt:serverTimestamp()},{merge:true});
  }catch(e){}
}

// ── NAV ──
function navTo(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.bn').forEach(b=>b.classList.remove('on'));
  document.getElementById('s-'+name).classList.add('on');
  document.getElementById('bn-'+name).classList.add('on');
  document.getElementById('fab').classList.toggle('show',name==='quiz');
  document.getElementById('scrollEl').scrollTop=0;
  if(name==='wrong') renderWrong();
  if(name==='stats') renderStats();
  updateHeader();
}
function goHome(){navTo('home');renderHome();}

// ── HOME ──
function renderHome(){
  const all=Object.keys(records).map(Number);
  const tot=all.length,ok=all.filter(n=>records[n]?.correct===true).length;
  const ng=tot-ok,rt=tot>0?Math.round(ok/tot*100)+'%':'-';
  document.getElementById('hs-tot').textContent=tot;
  document.getElementById('hs-ok').textContent=ok;
  document.getElementById('hs-ng').textContent=ng;
  document.getElementById('hs-rt').textContent=rt;
  const grid=document.getElementById('unitGrid');
  grid.innerHTML='';
  UNITS.forEach(u=>{
    const total=u.r[1]-u.r[0]+1;
    const solved=all.filter(n=>n>=u.r[0]&&n<=u.r[1]).length;
    const okCnt=all.filter(n=>n>=u.r[0]&&n<=u.r[1]&&records[n]?.correct===true).length;
    const prog=Math.round(solved/total*100);
    const rate=solved>0?Math.round(okCnt/solved*100)+'%':'-';
    const el=document.createElement('div');
    el.className='unit-card';
    el.style.setProperty('--unit-c',u.c);
    el.innerHTML=`
      <div class="ubadge">${String(u.id).padStart(2,'0')}</div>
      <div class="uinfo">
        <div class="uname">${u.name}</div>
        <div class="urange">${u.r[0]}~${u.r[1]}번 · ${total}문제</div>
        <div class="ubar"><div class="ubar-fill" style="width:${prog}%"></div></div>
      </div>
      <div class="uright"><div class="upct">${rate}</div><div class="ucnt">${solved}/${total}</div></div>`;
    el.onclick=()=>startUnit(u);
    grid.appendChild(el);
  });
}

// ── QUIZ ──
function startUnit(u){
  curUnit=u;curList=[];curIdx=0;
  for(let n=u.r[0];n<=u.r[1];n++) curList.push(n);
  const fi=curList.findIndex(n=>!records[n]);
  if(fi>=0) curIdx=fi;
  document.getElementById('qUnitTitle').textContent=`${String(u.id).padStart(2,'0')}. ${u.name}`;
  navTo('quiz');renderQ();
}

function renderQ(){
  const n=curList[curIdx];
  const tot=curList.length;
  document.getElementById('progFill').style.width=Math.round((curIdx+1)/tot*100)+'%';
  document.getElementById('qCounter').textContent=`${curIdx+1}/${tot}`;
  document.getElementById('qNumLbl').textContent=String(n).padStart(4,'0');
  const u=UNITS.find(u=>n>=u.r[0]&&n<=u.r[1])||{name:''};
  document.getElementById('qUnitTag').textContent=u.name;
  const pos=curIdx/curList.length;
  document.getElementById('qTypeTag').textContent=pos<0.33?'기본':pos<0.66?'유형':'심화';
  resetInput();
  renderQGrid();
  document.getElementById('scrollEl').scrollTop=0;
}

function resetInput(){
  setType('obj');
  document.querySelectorAll('.choice-btn').forEach(b=>b.className='choice-btn');
  selectedChoice=null;
  mathValue='';
  updateMathDisplay();
  document.getElementById('resultBox').className='result';
  document.getElementById('ytBtn').style.display='none';
  document.getElementById('mathDisplay').className='math-display';
  document.getElementById('checkBtn').textContent='✓ 채점하기';
  checked=false;
}

function setType(t){
  ansType=t;
  document.getElementById('tab-obj').classList.toggle('on',t==='obj');
  document.getElementById('tab-sub').classList.toggle('on',t==='sub');
  document.getElementById('obj-area').style.display=t==='obj'?'block':'none';
  document.getElementById('sub-area').style.display=t==='sub'?'block':'none';
}

// 객관식: 선택 즉시 채점
function selectChoice(btn){
  if(checked) return;
  document.querySelectorAll('.choice-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedChoice=btn.dataset.v;
  onCheck();
}

// 수식 키보드
function kb(v){
  if(checked) return;
  mathValue+=v;
  updateMathDisplay();
}
function kbDel(){if(checked)return;mathValue=mathValue.slice(0,-1);updateMathDisplay();}
function kbClear(){if(checked)return;mathValue='';updateMathDisplay();}

function onHiddenKey(e){
  if(checked)return;
  if(e.key==='Backspace'){kbDel();e.preventDefault();}
  else if(e.key==='Enter'){onCheck();e.preventDefault();}
}
function onHiddenInput(e){
  if(checked)return;
  const v=e.target.value;
  if(v){mathValue+=v;e.target.value='';updateMathDisplay();}
}

function updateMathDisplay(){
  const d=document.getElementById('mathDisplay');
  if(mathValue){
    d.innerHTML=`<span style="font-size:18px;letter-spacing:1px;">${esc(mathValue)}</span><span class="cursor"></span>`;
  } else {
    d.innerHTML='<span class="math-placeholder">수식 키보드로 답 입력</span>';
  }
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── 채점 ──
function onCheck(){
  if(checked) return;
  let userAns='';
  if(ansType==='obj'){
    if(!selectedChoice) return;
    userAns=selectedChoice;
  } else {
    if(!mathValue.trim()) return;
    userAns=mathValue.trim();
  }
  const n=curList[curIdx];
  const correct=ANS[n];
  const isOk=correct?matchAns(userAns,correct):null;
  checked=true;
  document.getElementById('checkBtn').textContent='다음으로 →';

  if(ansType==='obj'){
    document.querySelectorAll('.choice-btn').forEach(b=>{
      const v=b.dataset.v;
      if(correct&&matchAns(v,correct)) b.classList.add('correct');
      else if(v===userAns&&!isOk) b.classList.add('wrong');
    });
  } else {
    const d=document.getElementById('mathDisplay');
    d.classList.remove('focus');
    d.classList.add(isOk===null?'ok':isOk?'ok':'ng');
  }

  const box=document.getElementById('resultBox');
  if(isOk===null){
    box.className='result show ok';
    document.getElementById('rIcon').textContent='📝';
    document.getElementById('rTitle').textContent='저장되었습니다';
    document.getElementById('rAns').textContent='교재에서 정답을 확인하세요';
    saveRecord(n,{correct:null,userAns,ts:Date.now()});
  } else if(isOk){
    box.className='result show ok';
    document.getElementById('rIcon').textContent='🎉';
    document.getElementById('rTitle').textContent='정답입니다!';
    document.getElementById('rAns').textContent='';
    saveRecord(n,{correct:true,userAns,ts:Date.now()});
  } else {
    box.className='result show ng';
    document.getElementById('rIcon').textContent='😢';
    document.getElementById('rTitle').textContent='틀렸습니다';
    document.getElementById('rAns').innerHTML=`정답: <b>${correct}</b>`;
    saveRecord(n,{correct:false,userAns,correctAns:correct,ts:Date.now()});
    const yt=document.getElementById('ytBtn');
    yt.href=ytUrl(n);yt.style.display='flex';
  }
  updateHeader();renderQGrid();
}

function matchAns(u,c){
  const nm=s=>s.replace(/\s+/g,'').toLowerCase().replace(/×/g,'*').replace(/÷/g,'/').replace(/－/g,'-').replace(/＋/g,'+');
  if(nm(u)===nm(c)) return true;
  const m={'①':'1','②':'2','③':'3','④':'4','⑤':'5'};
  const r={'1':'①','2':'②','3':'③','4':'④','5':'⑤'};
  if(m[u]&&nm(m[u])===nm(c)) return true;
  if(r[u]&&nm(r[u])===nm(c)) return true;
  if(m[c]&&nm(u)===nm(m[c])) return true;
  return false;
}

function prevQ(){if(curIdx>0){curIdx--;renderQ();}}
function nextQ(){
  if(curIdx<curList.length-1){curIdx++;renderQ();}
  else{
    const ok=curList.filter(n=>records[n]?.correct===true).length;
    alert(`🎊 단원 완료!\n정답 ${ok} / 전체 ${curList.length}문제`);
    goHome();
  }
}

function renderQGrid(){
  const g=document.getElementById('qgrid');g.innerHTML='';
  curList.forEach((n,i)=>{
    const rec=records[n];
    let cls='un';
    if(rec?.correct===true) cls='ok';
    else if(rec?.correct===false) cls='ng';
    const btn=document.createElement('button');
    btn.className=`qg-btn ${cls}${i===curIdx?' cur':''}`;
    btn.textContent=String(n).slice(-3).padStart(3,'0');
    btn.onclick=()=>{curIdx=i;renderQ();closeSheet();};
    g.appendChild(btn);
  });
}
function openSheet(){document.getElementById('overlay').classList.add('show');renderQGrid();}
function closeSheet(){document.getElementById('overlay').classList.remove('show');}

// ── WRONG ──
function renderWrong(){
  const wrong=Object.keys(records).filter(k=>records[k]?.correct===false).map(Number).sort((a,b)=>a-b);
  document.getElementById('wrongSub').textContent=wrong.length>0?`틀린 문제 ${wrong.length}개`:'틀린 문제 없음 👍';
  const list=document.getElementById('wrongList');list.innerHTML='';
  if(!wrong.length){list.innerHTML='<div class="empty"><div class="ei">✅</div><p>오답 노트가 비어있어요!</p></div>';return;}
  wrong.forEach(n=>{
    const rec=records[n];
    const u=UNITS.find(u=>n>=u.r[0]&&n<=u.r[1])||{name:'?'};
    const el=document.createElement('div');el.className='wi';
    el.innerHTML=`
      <div class="wi-top"><span class="wi-num">문항 ${String(n).padStart(4,'0')}</span><span class="wi-unit">${u.name}</span></div>
      <div class="wi-ans">내 답: <span class="m">${rec.userAns||'?'}</span> → 정답: <span class="c">${rec.correctAns||ANS[n]||'?'}</span></div>
      <div class="wi-btns">
        <a class="wibtn wibtn-yt" href="${ytUrl(n)}" target="_blank">▶ 해설</a>
        <button class="wibtn wibtn-retry" onclick="retryQ(${n})">다시 풀기</button>
      </div>`;
    list.appendChild(el);
  });
}
function retryQ(n){
  const u=UNITS.find(u=>n>=u.r[0]&&n<=u.r[1]);if(!u)return;
  curUnit=u;curList=[n];curIdx=0;
  document.getElementById('qUnitTitle').textContent=`복습: ${String(n).padStart(4,'0')}번`;
  navTo('quiz');renderQ();
}

// ── STATS ──
function renderStats(){
  const all=Object.keys(records).map(Number);
  const tot=all.length,ok=all.filter(n=>records[n]?.correct===true).length;
  const ng=all.filter(n=>records[n]?.correct===false).length;
  const rt=tot>0?Math.round(ok/tot*100):0;
  document.getElementById('st-tot').textContent=tot;
  document.getElementById('st-ok').textContent=ok;
  document.getElementById('st-ng').textContent=ng;
  document.getElementById('st-rt').textContent=rt+'%';
  const ul=document.getElementById('ustatList');ul.innerHTML='';
  UNITS.forEach(u=>{
    const nums=all.filter(n=>n>=u.r[0]&&n<=u.r[1]);
    const c=nums.filter(n=>records[n]?.correct===true).length;
    const t=nums.length,totalU=u.r[1]-u.r[0]+1;
    const pct=t>0?Math.round(c/t*100):0;
    const prog=Math.round(t/totalU*100);
    const el=document.createElement('div');el.className='ustat';
    el.innerHTML=`
      <div class="ustat-top"><span>${String(u.id).padStart(2,'0')} ${u.name}</span><span style="color:${u.c}">${t}/${totalU} · ${pct}%</span></div>
      <div class="ustat-bar"><div class="ustat-fill" style="width:${prog}%;background:${u.c}"></div></div>`;
    ul.appendChild(el);
  });
}

function updateHeader(){
  const all=Object.keys(records).map(Number);
  document.getElementById('hc').textContent=all.filter(n=>records[n]?.correct===true).length;
  document.getElementById('hw').textContent=all.filter(n=>records[n]?.correct===false).length;
}
</script>
