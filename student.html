<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RPM 수학</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{--bg:#F0F3F8;--s:#fff;--dk:#1A1D2E;--nv:#252A4A;--pr:#FF4D1C;--gn:#26D07C;--rd:#FF3B5C;--gd:#FFB800;--mu:#8B95A7;--bd:#E8ECF4}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--dk)}
#app{display:flex;flex-direction:column;height:100%;overflow:hidden}
.scr{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.pane{display:none;padding:12px}
.pane.on{display:block}
/* LOGIN */
#p-login{display:flex;align-items:center;justify-content:center;min-height:100%;padding:24px}
.lcard{background:#fff;border-radius:20px;padding:28px 24px;width:100%;max-width:340px;box-shadow:0 4px 24px rgba(0,0,0,.1)}
.llogo{text-align:center;margin-bottom:20px}
.llogo b{font-family:'Bebas Neue';font-size:48px;color:var(--pr);letter-spacing:4px;display:block}
.llogo small{font-size:11px;color:var(--mu)}
.lf{margin-bottom:10px}
.lf label{display:block;font-size:11px;font-weight:700;color:var(--mu);margin-bottom:4px}
.lf input{width:100%;border:2px solid var(--bd);border-radius:9px;padding:11px;font-size:14px;font-family:inherit;outline:none}
.lf input:focus{border-color:var(--pr)}
.lbtn{width:100%;background:var(--pr);color:#fff;border:none;border-radius:9px;padding:12px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:4px}
.lerr{font-size:12px;color:var(--rd);text-align:center;margin-top:6px;min-height:16px}
/* TOPBAR */
.topbar{background:var(--dk);height:50px;padding:0 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tlogo{font-family:'Bebas Neue';font-size:20px;color:var(--pr);letter-spacing:2px}
.tr{display:flex;align-items:center;gap:7px}
.pill{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:3px 9px;font-size:11px;color:#fff}
.pill b{color:var(--gd)}
.tname{font-size:11px;color:rgba(255,255,255,.5)}
.tbtn{background:none;border:1px solid rgba(255,255,255,.2);border-radius:7px;padding:4px 9px;color:rgba(255,255,255,.6);font-size:11px;font-family:inherit;cursor:pointer}
/* BNAV */
.bnav{background:#fff;border-top:1px solid var(--bd);display:flex;flex-shrink:0}
.bn{flex:1;border:none;background:none;cursor:pointer;padding:8px 4px 6px;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:inherit;font-size:10px;color:var(--mu)}
.bn .ico{font-size:19px}
.bn.on{color:var(--pr)}
/* HOME */
.banner{background:linear-gradient(135deg,var(--dk),var(--nv));border-radius:14px;padding:16px;margin-bottom:10px;color:#fff}
.bname{font-size:12px;color:rgba(255,255,255,.5);margin-bottom:2px}
.btitle{font-size:17px;font-weight:900}
.bstats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:11px}
.bstat{background:rgba(255,255,255,.08);border-radius:8px;padding:8px;text-align:center}
.bstat .n{font-family:'Bebas Neue';font-size:22px;color:var(--gd);line-height:1}
.bstat .l{font-size:9px;color:rgba(255,255,255,.4)}
.sec{font-size:13px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.sec::before{content:'';width:3px;height:15px;background:var(--pr);border-radius:2px;display:block}
.ucards{display:flex;flex-direction:column;gap:6px}
.uc{background:#fff;border-radius:14px;padding:11px 13px;display:flex;align-items:center;gap:10px;cursor:pointer;border:2px solid transparent;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.ubadge{width:40px;height:40px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:16px;color:#fff;background:var(--uc)}
.ui{flex:1;min-width:0}
.uname{font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.urange{font-size:10px;color:var(--mu)}
.ubar{height:3px;background:var(--bg);border-radius:2px;margin-top:5px;overflow:hidden}
.ubf{height:100%;background:var(--uc);border-radius:2px}
.ur{text-align:right;flex-shrink:0}
.upct{font-size:12px;font-weight:700;color:var(--uc)}
.ucnt{font-size:10px;color:var(--mu)}
/* PAGE LIST */
.qhdr{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.back{width:32px;height:32px;border:none;background:#fff;border-radius:8px;cursor:pointer;font-size:15px;flex-shrink:0;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.06)}
.qtitle{font-size:12px;font-weight:700;flex:1}
.qctr{font-size:11px;color:var(--mu)}
.plist{display:flex;flex-direction:column;gap:5px}
.pi{background:#fff;border-radius:9px;padding:10px 13px;display:flex;align-items:center;gap:10px;cursor:pointer;border:2px solid var(--bd)}
.pi.done{border-color:#B2F5D0}
.pi.partial{border-color:var(--gd)}
.pnum{font-family:'Bebas Neue';font-size:22px;color:var(--pr);flex-shrink:0;width:36px}
.pinfo{flex:1;min-width:0}
.ptitle{font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prange{font-size:10px;color:var(--mu)}
.pright{text-align:right;flex-shrink:0}
.pscore{font-size:12px;font-weight:700}
/* QUIZ */
.pbar{height:5px;background:var(--bd);border-radius:3px;margin-bottom:10px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,var(--pr),var(--gd));border-radius:3px;transition:width .3s}
.qi{background:#fff;border-radius:12px;border:2px solid var(--bd);margin-bottom:8px;overflow:hidden}
.qi.ok{border-color:var(--gn)}
.qi.ng{border-color:var(--rd)}
.qhd{display:flex;align-items:center;justify-content:space-between;padding:10px 13px 8px;background:#FAFBFF;border-bottom:1px solid var(--bd)}
.qnum{font-family:'Bebas Neue';font-size:28px;color:var(--pr);line-height:1}
.qst{font-size:11px;color:var(--mu)}
.qst.ok{color:var(--gn);font-weight:700}
.qst.ng{color:var(--rd);font-weight:700}
.qch{padding:8px 10px 10px}
.crow{display:flex;flex-direction:column;gap:5px}
.cb{display:flex;align-items:center;gap:9px;border:2px solid var(--bd);border-radius:9px;padding:9px 12px;background:#fff;cursor:pointer;font-family:inherit;text-align:left;width:100%}
.cb.sel{border-color:var(--pr);background:#FFF3F0}
.cb.ok{border-color:var(--gn);background:#EDFFF5}
.cb.ng{border-color:var(--rd);background:#FFF5F7}
.cn{width:22px;height:22px;border-radius:50%;flex-shrink:0;background:var(--bd);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--mu)}
.cb.sel .cn{background:var(--pr);color:#fff}
.cb.ok .cn{background:var(--gn);color:#fff}
.cb.ng .cn{background:var(--rd);color:#fff}
.ct{font-size:12px;line-height:1.5;word-break:break-all}
.gbar{position:sticky;bottom:0;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);padding:10px 12px;border-top:1px solid var(--bd);margin:-12px -12px 0;display:flex;gap:8px;align-items:center}
.gi{flex:1;font-size:12px;color:var(--mu)}
.gi b{color:var(--dk)}
.gbtn{padding:11px 22px;background:var(--pr);color:#fff;border:none;border-radius:9px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer}
.gbtn:disabled{background:var(--bd);color:var(--mu);cursor:not-allowed}
.gbtn.done{background:var(--nv)}
.rs{background:linear-gradient(135deg,var(--dk),var(--nv));border-radius:14px;padding:16px;margin-bottom:10px;color:#fff}
.rstitle{font-size:14px;font-weight:700;margin-bottom:10px}
.rsgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.rsc{background:rgba(255,255,255,.1);border-radius:9px;padding:10px;text-align:center}
.rsc .n{font-family:'Bebas Neue';font-size:28px;line-height:1}
.rsc .l{font-size:10px;color:rgba(255,255,255,.6);margin-top:2px}
.rsact{display:flex;gap:7px;margin-top:10px}
.rsb{flex:1;padding:10px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700}
.rsb.next{background:var(--pr);color:#fff}
.rsb.retry{background:rgba(255,255,255,.15);color:#fff}
/* WRONG */
.wbanner{background:linear-gradient(135deg,#8B1A2E,var(--rd));border-radius:14px;padding:13px;margin-bottom:10px;color:#fff}
.wlist{display:flex;flex-direction:column;gap:6px}
.wi{background:#fff;border-radius:10px;border-left:4px solid var(--rd);padding:11px 13px}
.witop{display:flex;justify-content:space-between;margin-bottom:5px}
.winum{font-size:13px;font-weight:700;color:var(--rd)}
.wiunit{font-size:10px;color:var(--mu)}
.wians{font-size:12px;margin-bottom:6px}
.m{color:var(--rd);font-weight:600}
.c{color:var(--gn);font-weight:600}
.wibtn{padding:5px 10px;border-radius:6px;border:none;font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;background:var(--rd);color:#fff;text-decoration:none;display:inline-block}
/* STATS */
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.sc{background:#fff;border-radius:14px;padding:13px;text-align:center}
.sc .sn{font-family:'Bebas Neue';font-size:38px;line-height:1}
.sc .sl{font-size:10px;color:var(--mu)}
.usl{display:flex;flex-direction:column;gap:5px}
.us{background:#fff;border-radius:8px;padding:10px 12px}
.ustop{display:flex;justify-content:space-between;font-size:11px;font-weight:700;margin-bottom:4px}
.usbar{height:3px;background:var(--bg);border-radius:2px;overflow:hidden}
.usfill{height:100%;border-radius:2px}
.empty{text-align:center;padding:40px 20px;color:var(--mu)}
.empty .ei{font-size:40px;margin-bottom:8px}
</style>
</head>
<body>
<div id="app" style="display:none">
  <div class="topbar">
    <div class="tlogo">RPM</div>
    <div class="tr">
      <div class="pill">O <b id="hc">0</b></div>
      <div class="pill">X <b id="hw">0</b></div>
      <div class="tname" id="tname"></div>
      <button class="tbtn" onclick="doLogout()">로그아웃</button>
    </div>
  </div>
  <div class="scr" id="scr">
    <div id="p-login" style="display:none">
      <div class="lcard">
        <div class="llogo"><b>RPM</b><small>공통수학 1 · 학습</small></div>
        <div class="lf"><label>이메일</label><input type="email" id="em" placeholder="student@school.com"></div>
        <div class="lf"><label>비밀번호</label><input type="password" id="pw" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()"></div>
        <button class="lbtn" onclick="doLogin()">로그인</button>
        <div class="lerr" id="lerr"></div>
      </div>
    </div>
    <div class="pane on" id="p-home">
      <div class="banner">
        <div class="bname" id="bname">안녕하세요</div>
        <div class="btitle">오늘도 열심히! </div>
        <div class="bstats">
          <div class="bstat"><div class="n" id="hs0">0</div><div class="l">총 풀이</div></div>
          <div class="bstat"><div class="n" id="hs1">0</div><div class="l">정답</div></div>
          <div class="bstat"><div class="n" id="hs2">0</div><div class="l">오답</div></div>
          <div class="bstat"><div class="n" id="hs3">-</div><div class="l">정답률</div></div>
        </div>
      </div>
      <div class="sec">단원 선택</div>
      <div class="ucards" id="ucards"></div>
    </div>
    <div class="pane" id="p-unit">
      <div class="qhdr">
        <button class="back" onclick="go('home');renderHome()">←</button>
        <div class="qtitle" id="utitle"></div>
      </div>
      <div class="plist" id="plist"></div>
    </div>
    <div class="pane" id="p-quiz">
      <div class="qhdr">
        <button class="back" onclick="go('unit')">←</button>
        <div class="qtitle" id="ptitle"></div>
        <div class="qctr" id="pctr"></div>
      </div>
      <div class="pbar"><div class="pfill" id="pfill" style="width:0%"></div></div>
      <div id="rsbox" style="display:none">
        <div class="rs">
          <div class="rstitle"> 채점 결과</div>
          <div class="rsgrid">
            <div class="rsc"><div class="n" id="rs0">0</div><div class="l">전체</div></div>
            <div class="rsc"><div class="n" id="rs1" style="color:var(--gn)">0</div><div class="l">정답</div></div>
            <div class="rsc"><div class="n" id="rs2" style="color:var(--rd)">0</div><div class="l">오답</div></div>
          </div>
          <div class="rsact">
            <button class="rsb retry" onclick="retryPage()">↺ 다시</button>
            <button class="rsb next" onclick="nextPage()">다음 →</button>
          </div>
        </div>
      </div>
      <div id="qwrap"></div>
      <div class="gbar">
        <div class="gi" id="gi">답을 선택하세요</div>
        <button class="gbtn" id="gbtn" onclick="gradeAll()" disabled>채점하기</button>
      </div>
    </div>
    <div class="pane" id="p-wrong">
      <div class="wbanner">
        <h2 style="font-size:15px;font-weight:700">X 오답 노트</h2>
        <p style="font-size:11px;opacity:.75;margin-top:2px" id="wsub"></p>
      </div>
      <div class="wlist" id="wlist"></div>
    </div>
    <div class="pane" id="p-stats">
      <div style="font-size:17px;font-weight:900;margin-bottom:10px"> 학습 통계</div>
      <div class="sgrid">
        <div class="sc"><div class="sn" id="st0">0</div><div class="sl">총 풀이</div></div>
        <div class="sc"><div class="sn" id="st1" style="color:var(--pr)">0%</div><div class="sl">정답률</div></div>
        <div class="sc"><div class="sn" id="st2" style="color:var(--gn)">0</div><div class="sl">정답</div></div>
        <div class="sc"><div class="sn" id="st3" style="color:var(--rd)">0</div><div class="sl">오답</div></div>
      </div>
      <div style="font-size:12px;font-weight:700;margin-bottom:6px">단원별 성취도</div>
      <div class="usl" id="usl"></div>
    </div>
  </div>
  <div class="bnav">
    <button class="bn on" id="bn-home" onclick="go('home');renderHome()"><span class="ico"></span><span>단원</span></button>
    <button class="bn" id="bn-wrong" onclick="go('wrong')"><span class="ico">X</span><span>오답</span></button>
    <button class="bn" id="bn-stats" onclick="go('stats')"><span class="ico"></span><span>통계</span></button>
  </div>
</div>

const N=['①','②','③','④','⑤'];
let FBauth=null,FBdb=null;
let curUser=null,records={};
let curUnit=null,curPages=[],curPageIdx=0,curQs=[],sel={},graded=false;

// ── Firebase 로드 (동적, 실패해도 앱은 동작) ──
function loadFirebase(){
  return new Promise(resolve=>{
    try{
      const s1=document.createElement('script');
      s1.src='https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js';
      s1.onload=()=>{
        const s2=document.createElement('script');
        s2.src='https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js';
        s2.onload=()=>{
          const s3=document.createElement('script');
          s3.src='https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js';
          s3.onload=()=>{
            try{
              firebase.initializeApp(FB_CFG);
              FBauth=firebase.auth();
              FBdb=firebase.firestore();
              resolve(true);
            }catch(e){resolve(false);}
          };
          s3.onerror=()=>resolve(false);
          document.head.appendChild(s3);
        };
        s2.onerror=()=>resolve(false);
        document.head.appendChild(s2);
      };
      s1.onerror=()=>resolve(false);
      document.head.appendChild(s1);
    }catch(e){resolve(false);}
  });
}

// ── 로컬 스토리지 계정 관리 ──
function getLocalAccounts(){try{return JSON.parse(localStorage.getItem('rpm_accounts')||'{}');}catch(e){return {};}}
function saveLocalAccount(em,pw,name){const a=getLocalAccounts();a[em]={pw,name};localStorage.setItem('rpm_accounts',JSON.stringify(a));}
function getLocalSession(){try{return JSON.parse(localStorage.getItem('rpm_session')||'null');}catch(e){return null;}}
function saveLocalSession(u){localStorage.setItem('rpm_session',JSON.stringify(u));}
function clearLocalSession(){localStorage.removeItem('rpm_session');}

// ── records 저장/로드 ──
function getRKey(){return 'rpm_rec_'+(curUser?curUser.uid||curUser.email:'guest');}
function loadRecordsLocal(){try{return JSON.parse(localStorage.getItem(getRKey())||'{}');}catch(e){return {};}}
function saveRecordsLocal(r){try{localStorage.setItem(getRKey(),JSON.stringify(r));}catch(e){}}

async function loadRecords(){
  records=loadRecordsLocal();
  if(FBdb&&curUser&&curUser.uid){
    try{
      const snap=await FBdb.doc('students/'+curUser.uid+'/data/records').get();
      if(snap.exists()){const d=snap.data().records||{};records=Object.assign({},d,records);saveRecordsLocal(records);}
    }catch(e){}
  }
}
async function saveRecords(batch){
  Object.assign(records,batch);
  saveRecordsLocal(records);
  if(FBdb&&curUser&&curUser.uid){
    try{await FBdb.doc('students/'+curUser.uid+'/data/records').set({records,updatedAt:new Date()},{merge:true});}catch(e){}
  }
}

// ── 로그인 ──
async function doLogin(){
  const em=document.getElementById('em').value.trim();
  const pw=document.getElementById('pw').value;
  if(!em||!pw){document.getElementById('lerr').textContent='이메일과 비밀번호를 입력하세요.';return;}
  document.getElementById('lerr').textContent='로그인 중...';

  let user=null;

  // 1) Firebase 로그인 시도
  if(FBauth){
    try{
      const cred=await FBauth.signInWithEmailAndPassword(em,pw);
      user={uid:cred.user.uid,email:cred.user.email,name:cred.user.displayName||em.split('@')[0]};
      saveLocalAccount(em,pw,user.name);
    }catch(e){
      // Firebase 실패 → 로컬 계정 확인
      const accs=getLocalAccounts();
      if(accs[em]&&accs[em].pw===pw){user={uid:em,email:em,name:accs[em].name||em.split('@')[0]};}
    }
  } else {
    // Firebase 없음 → 로컬만
    const accs=getLocalAccounts();
    if(accs[em]&&accs[em].pw===pw){user={uid:em,email:em,name:accs[em].name||em.split('@')[0]};}
    else{
      // 첫 로그인이면 계정 생성
      const n=em.split('@')[0];
      saveLocalAccount(em,pw,n);
      user={uid:em,email:em,name:n};
    }
  }

  if(!user){document.getElementById('lerr').textContent='이메일 또는 비밀번호가 올바르지 않습니다.';return;}

  document.getElementById('lerr').textContent='';
  loginSuccess(user);
}

async function loginSuccess(user){
  curUser=user;
  saveLocalSession(user);
  document.getElementById('p-login').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('tname').textContent=user.name;
  document.getElementById('bname').textContent=user.name+'님, 안녕하세요!';
  await loadRecords();
  renderHome();updateHeader();
}

async function doLogout(){
  if(FBauth)try{await FBauth.signOut();}catch(e){}
  clearLocalSession();
  curUser=null;records={};
  document.getElementById('app').style.display='none';
  document.getElementById('p-login').style.display='flex';
}

// ── 앱 시작 ──
window.addEventListener('load',async()=>{
  const fbOk=await loadFirebase();

  // Firebase 로드됐으면 auth 상태 감지
  if(fbOk&&FBauth){
    FBauth.onAuthStateChanged(async fbUser=>{
      if(fbUser){
        const user={uid:fbUser.uid,email:fbUser.email,name:fbUser.displayName||fbUser.email.split('@')[0]};
        saveLocalAccount(fbUser.email,'__fb__',user.name);
        await loginSuccess(user);
      }
    });
  }

  // 로컬 세션 확인
  const session=getLocalSession();
  if(session&&!curUser){
    await loginSuccess(session);
    return;
  }

  if(!curUser){
    document.getElementById('p-login').style.display='flex';
  }
});

// ── 네비게이션 ──
function go(name){
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.bn').forEach(b=>b.classList.remove('on'));
  document.getElementById('p-'+name).classList.add('on');
  const bn=document.getElementById('bn-'+name);
  if(bn)bn.classList.add('on');
  document.getElementById('scr').scrollTop=0;
  if(name==='wrong')renderWrong();
  if(name==='stats')renderStats();
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── HOME ──
function renderHome(){
  go('home');
  const all=Object.keys(records).map(Number);
  const tot=all.length,ok=all.filter(n=>records[n]?.correct===true).length;
  document.getElementById('hs0').textContent=tot;
  document.getElementById('hs1').textContent=ok;
  document.getElementById('hs2').textContent=tot-ok;
  document.getElementById('hs3').textContent=tot>0?Math.round(ok/tot*100)+'%':'-';
  const g=document.getElementById('ucards');g.innerHTML='';
  UNITS.forEach(u=>{
    const total=u.r[1]-u.r[0]+1;
    const solved=all.filter(n=>n>=u.r[0]&&n<=u.r[1]).length;
    const okc=all.filter(n=>n>=u.r[0]&&n<=u.r[1]&&records[n]?.correct===true).length;
    const el=document.createElement('div');el.className='uc';
    el.style.setProperty('--uc',u.c);
    el.innerHTML=`<div class="ubadge">${String(u.id).padStart(2,'0')}</div>
      <div class="ui"><div class="uname">${u.name}</div>
      <div class="urange">${u.r[0]}~${u.r[1]}번 · ${total}문제</div>
      <div class="ubar"><div class="ubf" style="width:${Math.round(solved/total*100)}%"></div></div></div>
      <div class="ur"><div class="upct">${solved>0?Math.round(okc/solved*100)+'%':'-'}</div>
      <div class="ucnt">${solved}/${total}</div></div>`;
    el.onclick=()=>openUnit(u);
    g.appendChild(el);
  });
}

function openUnit(u){
  curUnit=u;
  curPages=PAGE_MAP.filter(p=>p[1][0]>=u.r[0]&&p[1][1]<=u.r[1]);
  document.getElementById('utitle').textContent=String(u.id).padStart(2,'0')+'. '+u.name;
  renderPageList();go('unit');
}

function renderPageList(){
  const l=document.getElementById('plist');l.innerHTML='';
  curPages.forEach((p,i)=>{
    const[pdf,[qs,qe],title]=p;
    const ns=[];for(let n=qs;n<=qe;n++)ns.push(n);
    const sv=ns.filter(n=>records[n]).length;
    const ok=ns.filter(n=>records[n]?.correct===true).length;
    const done=sv===ns.length;
    const el=document.createElement('div');
    el.className='pi'+(done?' done':sv>0?' partial':'');
    const sc=done&&ok===ns.length?'var(--gn)':sv>0?'var(--pr)':'var(--mu)';
    el.innerHTML=`<div class="pnum">P${i+1}</div>
      <div class="pinfo"><div class="ptitle">${title}</div>
      <div class="prange">${qs}~${qe}번 · ${ns.length}문제${pdf?' ('+pdf+'쪽)':''}</div></div>
      <div class="pright"><div class="pscore" style="color:${sc}">${sv>0?ok+'/'+ns.length:'-'}</div></div>`;
    el.onclick=()=>startPage(i);
    l.appendChild(el);
  });
}

function startPage(idx){
  curPageIdx=idx;
  const[pdf,[qs,qe],title]=curPages[idx];
  curQs=[];for(let n=qs;n<=qe;n++)curQs.push(n);
  sel={};graded=false;
  document.getElementById('ptitle').textContent=title;
  document.getElementById('pctr').textContent=(idx+1)+'/'+curPages.length;
  document.getElementById('pfill').style.width=Math.round((idx+1)/curPages.length*100)+'%';
  document.getElementById('rsbox').style.display='none';
  const gb=document.getElementById('gbtn');gb.className='gbtn';gb.disabled=true;gb.textContent='채점하기';
  renderQItems();go('quiz');
}

function renderQItems(){
  const w=document.getElementById('qwrap');w.innerHTML='';
  curQs.forEach(n=>{
    const cd=CHOICES[n],rec=records[n];
    const el=document.createElement('div');
    el.className='qi'+(rec?.correct===true?' ok':rec?.correct===false?' ng':'');
    el.id='qi'+n;
    const st=rec?.correct===true?'O 정답':rec?.correct===false?'X 오답':'미풀이';
    const sc=rec?.correct===true?'ok':rec?.correct===false?'ng':'';
    el.innerHTML=`<div class="qhd"><div class="qnum">${String(n).padStart(4,'0')}</div>
      <div class="qst ${sc}" id="qs${n}">${st}</div></div>
      <div class="qch" id="qc${n}"></div>`;
    w.appendChild(el);
    const cw=document.getElementById('qc'+n);
    if(cd){
      const row=document.createElement('div');row.className='crow';
      cd.c.forEach((txt,i)=>{
        const b=document.createElement('button');b.className='cb';
        b.dataset.n=n;b.dataset.i=i;
        if(rec&&rec.correct!==undefined&&rec.correct!==null){
          if(i===cd.a)b.classList.add('ok');
          else if(rec.userAns===cd.c[i]&&!rec.correct)b.classList.add('ng');
          b.disabled=true;
        }
        b.innerHTML=`<div class="cn">${N[i]}</div><div class="ct">${esc(txt)}</div>`;
        b.onclick=()=>pick(n,i);
        row.appendChild(b);
      });
      cw.appendChild(row);
    } else {
      cw.innerHTML='<div style="padding:10px;font-size:12px;color:var(--mu)">교재에서 확인하세요</div>';
    }
  });
  updateGBar();
}

function pick(n,i){
  if(graded)return;
  sel[n]=i;
  document.querySelectorAll(`.cb[data-n="${n}"]`).forEach((b,j)=>b.classList.toggle('sel',j===i));
  updateGBar();
}

function updateGBar(){
  const nq=curQs.filter(n=>!records[n]||records[n].correct===undefined||records[n].correct===null);
  const ans=nq.filter(n=>sel[n]!==undefined).length;
  document.getElementById('gi').innerHTML=`<b>${ans}</b>/${nq.length} 답 선택됨`;
  document.getElementById('gbtn').disabled=(ans===0);
}

function gradeAll(){
  if(Object.keys(sel).length===0)return;
  graded=true;
  const batch={};let ok=0,ng=0;
  curQs.forEach(n=>{
    const cd=CHOICES[n];if(!cd)return;
    const s=sel[n];if(s===undefined)return;
    const isOk=(s===cd.a);
    isOk?ok++:ng++;
    batch[n]={correct:isOk,userAns:cd.c[s],correctAns:cd.c[cd.a],ts:Date.now()};
    const el=document.getElementById('qi'+n);
    if(el){el.classList.remove('ok','ng');el.classList.add(isOk?'ok':'ng');}
    const se=document.getElementById('qs'+n);
    if(se){se.textContent=isOk?'O 정답':'X 오답';se.className='qst '+(isOk?'ok':'ng');}
    document.querySelectorAll(`.cb[data-n="${n}"]`).forEach((b,i)=>{
      b.classList.remove('sel');
      if(i===cd.a)b.classList.add('ok');
      else if(i===s&&!isOk)b.classList.add('ng');
      b.disabled=true;
    });
  });
  saveRecords(batch);updateHeader();
  document.getElementById('rs0').textContent=Object.keys(sel).length;
  document.getElementById('rs1').textContent=ok;
  document.getElementById('rs2').textContent=ng;
  document.getElementById('rsbox').style.display='block';
  const gb=document.getElementById('gbtn');gb.textContent='채점 완료 ✓';gb.className='gbtn done';gb.disabled=true;
  document.getElementById('scr').scrollTop=0;
}

function retryPage(){
  curQs.forEach(n=>{delete records[n];});
  saveRecordsLocal(records);
  sel={};graded=false;
  document.getElementById('rsbox').style.display='none';
  const gb=document.getElementById('gbtn');gb.className='gbtn';gb.disabled=true;gb.textContent='채점하기';
  renderQItems();
}

function nextPage(){
  if(curPageIdx<curPages.length-1)startPage(curPageIdx+1);
  else{alert(' 단원 완료!');renderPageList();go('unit');}
}

function renderWrong(){
  const wrong=Object.keys(records).filter(k=>records[k]?.correct===false).map(Number).sort((a,b)=>a-b);
  document.getElementById('wsub').textContent=wrong.length?'틀린 문제 '+wrong.length+'개':'틀린 문제 없음 ';
  const l=document.getElementById('wlist');l.innerHTML='';
  if(!wrong.length){l.innerHTML='<div class="empty"><div class="ei">O</div><p>오답 노트가 비어있어요!</p></div>';return;}
  wrong.forEach(n=>{
    const r=records[n];
    const u=UNITS.find(u=>n>=u.r[0]&&n<=u.r[1])||{name:'?'};
    const el=document.createElement('div');el.className='wi';
    el.innerHTML=`<div class="witop"><span class="winum">문항 ${String(n).padStart(4,'0')}</span><span class="wiunit">${u.name}</span></div>
      <div class="wians">내 답: <span class="m">${esc(r.userAns||'?')}</span> → 정답: <span class="c">${esc(r.correctAns||'?')}</span></div>
      <a class="wibtn" href="https://www.youtube.com/results?search_query=RPM+공통수학1+${String(n).padStart(4,'0')}번" target="_blank">▶ 해설</a>`;
    l.appendChild(el);
  });
}

function renderStats(){
  const all=Object.keys(records).map(Number);
  const tot=all.length,ok=all.filter(n=>records[n]?.correct===true).length;
  document.getElementById('st0').textContent=tot;
  document.getElementById('st1').textContent=tot>0?Math.round(ok/tot*100)+'%':'0%';
  document.getElementById('st2').textContent=ok;
  document.getElementById('st3').textContent=tot-ok;
  const ul=document.getElementById('usl');ul.innerHTML='';
  UNITS.forEach(u=>{
    const ns=all.filter(n=>n>=u.r[0]&&n<=u.r[1]);
    const c=ns.filter(n=>records[n]?.correct===true).length;
    const t=ns.length,total=u.r[1]-u.r[0]+1;
    const el=document.createElement('div');el.className='us';
    el.innerHTML=`<div class="ustop"><span>${String(u.id).padStart(2,'0')} ${u.name}</span>
      <span style="color:${u.c}">${t}/${total} · ${t>0?Math.round(c/t*100):0}%</span></div>
      <div class="usbar"><div class="usfill" style="width:${Math.round(t/total*100)}%;background:${u.c}"></div></div>`;
    ul.appendChild(el);
  });
}

function updateHeader(){
  const all=Object.keys(records).map(Number);
  document.getElementById('hc').textContent=all.filter(n=>records[n]?.correct===true).length;
  document.getElementById('hw').textContent=all.filter(n=>records[n]?.correct===false).length;
}
