<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>RPM 수학 학습</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
  const firebaseConfig = {
    apiKey: "AIzaSyARHy35Dd2n0Fw1sUs-U4zY0BY9WVneMJ4",
    authDomain: "rpm-57f1a.firebaseapp.com",
    projectId: "rpm-57f1a",
    storageBucket: "rpm-57f1a.firebasestorage.app",
    messagingSenderId: "681087068656",
    appId: "1:681087068656:web:68c9d3ef6df32dceb89535"
  };
  const app=initializeApp(firebaseConfig);
  window._fb={
    auth:getAuth(app), db:getFirestore(app),
    signInWithEmailAndPassword, signOut, onAuthStateChanged,
    doc, getDoc, setDoc, serverTimestamp
  };
</script>
<style>
:root{
  --bg:#F0F3F8;--surface:#fff;--dark:#1A1D2E;--navy:#252A4A;
  --primary:#FF4D1C;--green:#26D07C;--red:#FF3B5C;--gold:#FFB800;
  --muted:#8B95A7;--border:#E8ECF4;--r:14px;
  --shadow:0 4px 20px rgba(26,29,46,.08);--shadow-sm:0 2px 8px rgba(26,29,46,.06);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:'Noto Sans KR',sans-serif;color:var(--dark);background:var(--bg);}
#app{display:flex;flex-direction:column;height:100%;overflow:hidden;}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.scroll::-webkit-scrollbar{width:3px;}
.scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* TOP BAR */
.topbar{background:var(--dark);padding:0 14px;display:flex;align-items:center;
  justify-content:space-between;height:50px;flex-shrink:0;z-index:50;box-shadow:0 2px 12px rgba(0,0,0,.25);}
.tbar-logo{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--primary);letter-spacing:2px;}
.tbar-right{display:flex;align-items:center;gap:7px;}
.pill{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);
  border-radius:20px;padding:3px 9px;font-size:11px;color:white;display:flex;align-items:center;gap:3px;}
.pill b{color:var(--gold);}
.tbar-name{font-size:11px;color:rgba(255,255,255,.5);}
.logout-btn{background:none;border:1px solid rgba(255,255,255,.18);border-radius:7px;
  padding:4px 9px;color:rgba(255,255,255,.55);font-size:11px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}

/* BOTTOM NAV */
.bnav{background:var(--surface);border-top:1px solid var(--border);display:flex;flex-shrink:0;box-shadow:0 -4px 16px rgba(0,0,0,.05);}
.bn{flex:1;border:none;background:none;cursor:pointer;padding:8px 4px 6px;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  font-family:'Noto Sans KR',sans-serif;font-size:10px;color:var(--muted);transition:color .2s;}
.bn .ico{font-size:19px;transition:transform .2s;}
.bn.on{color:var(--primary);}
.bn.on .ico{transform:scale(1.1);}

/* SCREENS */
.screen{display:none;padding:12px;animation:fadeIn .2s ease;}
.screen.on{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

/* LOGIN */
#s-login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;padding:32px 20px;}
.login-card{width:100%;max-width:360px;background:var(--surface);border-radius:20px;padding:30px 26px;box-shadow:var(--shadow);}
.login-logo{text-align:center;margin-bottom:22px;}
.login-logo .big{font-family:'Bebas Neue',sans-serif;font-size:44px;color:var(--primary);letter-spacing:4px;}
.login-logo .sub{font-size:12px;color:var(--muted);}
.lfield{margin-bottom:11px;}
.lfield label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;}
.linput{width:100%;border:2px solid var(--border);border-radius:9px;padding:11px 13px;
  font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .2s;}
.linput:focus{border-color:var(--primary);}
.lbtn{width:100%;background:var(--primary);color:white;border:none;border-radius:9px;
  padding:12px;font-size:15px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;margin-top:4px;}
.lerr{font-size:12px;color:var(--red);margin-top:7px;text-align:center;}

/* HOME */
.home-banner{background:linear-gradient(135deg,var(--dark),var(--navy));border-radius:var(--r);
  padding:16px;margin-bottom:11px;color:white;position:relative;overflow:hidden;}
.home-banner::before{content:'RPM';position:absolute;right:-8px;top:-6px;
  font-family:'Bebas Neue',sans-serif;font-size:100px;color:rgba(255,255,255,.04);line-height:1;pointer-events:none;}
.hb-name{font-size:12px;color:rgba(255,255,255,.55);margin-bottom:2px;}
.hb-title{font-size:17px;font-weight:900;}
.hb-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:11px;}
.hb-stat{background:rgba(255,255,255,.08);border-radius:8px;padding:8px;text-align:center;}
.hb-stat .n{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--orange);line-height:1;}
.hb-stat .l{font-size:9px;color:rgba(255,255,255,.4);margin-top:1px;}
.sec-title{font-size:13px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:7px;}
.sec-title::before{content:'';width:3px;height:15px;background:var(--primary);border-radius:2px;}
.unit-grid{display:flex;flex-direction:column;gap:6px;}
.unit-card{background:var(--surface);border-radius:var(--r);padding:11px 13px;
  display:flex;align-items:center;gap:11px;cursor:pointer;border:2px solid transparent;
  box-shadow:var(--shadow-sm);transition:all .2s;}
.unit-card:active{transform:scale(.98);}
.ubadge{width:40px;height:40px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:16px;color:white;background:var(--unit-c);}
.uinfo{flex:1;min-width:0;}
.uname{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.urange{font-size:10px;color:var(--muted);margin-top:1px;}
.ubar{height:3px;background:var(--bg);border-radius:2px;margin-top:5px;overflow:hidden;}
.ubar-fill{height:100%;border-radius:2px;background:var(--unit-c);transition:width .5s;}
.uright{text-align:right;flex-shrink:0;}
.upct{font-size:12px;font-weight:700;color:var(--unit-c);}
.ucnt{font-size:10px;color:var(--muted);margin-top:1px;}

/* 페이지 목록 */
.page-list{display:flex;flex-direction:column;gap:5px;margin-top:6px;}
.page-item{
  background:white;border-radius:9px;padding:10px 13px;
  display:flex;align-items:center;gap:10px;cursor:pointer;
  border:2px solid var(--border);box-shadow:var(--shadow-sm);transition:all .15s;
}
.page-item:active{transform:scale(.98);}
.page-item.done{border-color:#B2F5D0;}
.page-item.partial{border-color:var(--gold);}
.pi-num{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--primary);flex-shrink:0;width:36px;}
.pi-info{flex:1;min-width:0;}
.pi-title{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pi-range{font-size:10px;color:var(--muted);margin-top:1px;}
.pi-right{text-align:right;flex-shrink:0;}
.pi-score{font-size:12px;font-weight:700;}
.pi-cnt{font-size:10px;color:var(--muted);}

/* QUIZ - 페이지 단위 채점 */
.quiz-header{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
.back-btn{width:32px;height:32px;border:none;background:var(--surface);border-radius:8px;
  cursor:pointer;font-size:15px;flex-shrink:0;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm);}
.quiz-title{font-size:12px;font-weight:700;flex:1;}
.quiz-counter{font-size:11px;color:var(--muted);white-space:nowrap;}
.progbar{height:5px;background:var(--border);border-radius:3px;margin-bottom:10px;overflow:hidden;}
.progfill{height:100%;background:linear-gradient(90deg,var(--primary),var(--gold));border-radius:3px;transition:width .35s;}

/* 페이지 안내 배너 */
.page-banner{
  background:linear-gradient(135deg,var(--dark),var(--navy));
  border-radius:var(--r);padding:14px 16px;margin-bottom:10px;color:white;
  display:flex;justify-content:space-between;align-items:center;
}
.pb-left .pb-label{font-size:10px;color:rgba(255,255,255,.5);margin-bottom:2px;}
.pb-left .pb-range{font-family:'Bebas Neue',sans-serif;font-size:32px;color:white;line-height:1;}
.pb-right{text-align:right;}
.pb-title{font-size:11px;color:rgba(255,255,255,.7);font-weight:600;max-width:150px;text-align:right;line-height:1.4;}
.pb-cnt{font-size:10px;color:rgba(255,255,255,.4);margin-top:4px;}

/* 문제 카드 (페이지 내 개별 문제) */
.q-item{
  background:var(--surface);border-radius:12px;
  border:2px solid var(--border);margin-bottom:8px;
  overflow:hidden;box-shadow:var(--shadow-sm);transition:border-color .2s;
}
.q-item.answered{border-color:var(--border);}
.q-item.correct{border-color:var(--green);}
.q-item.wrong{border-color:var(--red);}
.q-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 13px 8px;border-bottom:1px solid var(--border);
  background:#FAFBFF;
}
.q-head-left{display:flex;align-items:center;gap:8px;}
.q-num{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--primary);line-height:1;}
.q-status{font-size:11px;color:var(--muted);}
.q-status.ok{color:var(--green);font-weight:700;}
.q-status.ng{color:var(--red);font-weight:700;}
.q-choices{padding:8px 10px 10px;}
.choice-row-q{display:flex;flex-direction:column;gap:5px;}
.choice-btn-q{
  display:flex;align-items:center;gap:9px;
  border:2px solid var(--border);border-radius:9px;padding:9px 12px;
  background:white;cursor:pointer;transition:all .12s;text-align:left;
  font-family:'Noto Sans KR',sans-serif;
}
.choice-btn-q:active{transform:scale(.99);}
.choice-btn-q.selected{border-color:var(--primary);background:#FFF3F0;}
.choice-btn-q.correct{border-color:var(--green);background:#EDFFF5;}
.choice-btn-q.wrong{border-color:var(--red);background:#FFF5F7;}
.cn{width:22px;height:22px;border-radius:50%;flex-shrink:0;background:var(--border);
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);}
.choice-btn-q.selected .cn{background:var(--primary);color:white;}
.choice-btn-q.correct .cn{background:var(--green);color:white;}
.choice-btn-q.wrong .cn{background:var(--red);color:white;}
.ct{font-size:12px;color:var(--dark);line-height:1.5;word-break:break-all;}

/* 채점 버튼 */
.grade-bar{
  position:sticky;bottom:0;background:rgba(255,255,255,.95);
  backdrop-filter:blur(8px);padding:10px 12px;
  border-top:1px solid var(--border);margin:-12px -12px 0;
  display:flex;gap:8px;align-items:center;
}
.grade-info{flex:1;font-size:12px;color:var(--muted);}
.grade-info b{color:var(--dark);}
.grade-btn{
  padding:11px 22px;background:var(--primary);color:white;border:none;
  border-radius:9px;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.grade-btn:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;}
.grade-btn.done{background:var(--navy);}

/* 결과 요약 */
.result-summary{
  background:linear-gradient(135deg,var(--dark),var(--navy));
  border-radius:var(--r);padding:16px;margin-bottom:10px;color:white;
}
.rs-title{font-size:14px;font-weight:700;margin-bottom:12px;}
.rs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.rs-card{background:rgba(255,255,255,.1);border-radius:9px;padding:10px;text-align:center;}
.rs-card .n{font-family:'Bebas Neue',sans-serif;font-size:30px;line-height:1;}
.rs-card .l{font-size:10px;color:rgba(255,255,255,.6);margin-top:2px;}
.rs-actions{display:flex;gap:7px;margin-top:12px;}
.rs-btn{flex:1;padding:10px;border-radius:8px;border:none;cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;}
.rs-btn-next{background:var(--primary);color:white;}
.rs-btn-retry{background:rgba(255,255,255,.15);color:white;}

/* nav prev/next */
.page-nav{display:flex;gap:7px;padding:10px 0 4px;}
.page-nav-btn{flex:1;padding:12px;border-radius:9px;border:none;
  font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.page-nav-prev{background:var(--border);color:var(--dark);}
.page-nav-next{background:var(--primary);color:white;}

/* WRONG */
.wrong-banner{background:linear-gradient(135deg,#8B1A2E,var(--red));border-radius:var(--r);padding:13px;margin-bottom:11px;color:white;}
.wrong-list{display:flex;flex-direction:column;gap:6px;}
.wi{background:var(--surface);border-radius:10px;border-left:4px solid var(--red);padding:11px 13px;box-shadow:var(--shadow-sm);}
.wi-top{display:flex;justify-content:space-between;margin-bottom:5px;}
.wi-num{font-size:13px;font-weight:700;color:var(--red);}
.wi-unit{font-size:10px;color:var(--muted);}
.wi-ans{font-size:12px;margin-bottom:8px;}
.wi-ans .m{color:var(--red);font-weight:600;}
.wi-ans .c{color:var(--green);font-weight:600;}
.wi-btns{display:flex;gap:5px;}
.wibtn{padding:5px 10px;border-radius:6px;border:none;font-family:'Noto Sans KR',sans-serif;
  font-size:11px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:3px;}
.wibtn-yt{background:var(--red);color:white;}
.wibtn-retry{background:var(--border);color:var(--dark);}

/* STATS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:11px;}
.scard{background:var(--surface);border-radius:var(--r);padding:13px;text-align:center;box-shadow:var(--shadow-sm);}
.scard .sn{font-family:'Bebas Neue',sans-serif;font-size:38px;line-height:1;}
.scard .sl{font-size:10px;color:var(--muted);margin-top:1px;}
.ustat-list{display:flex;flex-direction:column;gap:5px;}
.ustat{background:var(--surface);border-radius:8px;padding:10px 12px;box-shadow:var(--shadow-sm);}
.ustat-top{display:flex;justify-content:space-between;font-size:11px;font-weight:600;margin-bottom:5px;}
.ustat-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.ustat-fill{height:100%;border-radius:2px;}
.empty{text-align:center;padding:38px 20px;color:var(--muted);}
.empty .ei{font-size:40px;margin-bottom:9px;}

/* PC */
@media(min-width:768px){
  #app{flex-direction:row;}
  .topbar{display:none;}
  .bnav{flex-direction:column;width:72px;height:100%;border-top:none;border-right:1px solid var(--border);padding:16px 0;}
  .bn{padding:11px 4px;font-size:9px;}
  .bn .ico{font-size:21px;}
  .scroll{padding:0;}
  .screen{max-width:680px;margin:0 auto;padding:20px;}
  .bnav::before{content:'RPM';font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--primary);
    letter-spacing:2px;display:block;text-align:center;padding:0 0 16px;
    border-bottom:1px solid var(--border);margin-bottom:8px;}
  .grade-bar{margin:-20px -20px 0;}
}
</style>
</head>
<body>
<div id="app" style="display:none;">
  <div class="topbar">
    <div class="tbar-logo">RPM 数学</div>
    <div class="tbar-right">
      <div class="pill">✅ <b id="hc">0</b></div>
      <div class="pill">❌ <b id="hw">0</b></div>
      <div class="tbar-name" id="tbarName"></div>
      <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <div class="scroll" id="scrollEl">
    <!-- LOGIN -->
    <div id="s-login" style="display:none;">
      <div class="login-card">
        <div class="login-logo"><div class="big">RPM</div><div class="sub">공통수학 1 · 학습 시스템</div></div>
        <div class="lfield"><label>이메일</label><input class="linput" type="email" id="lemail" placeholder="student@school.com"></div>
        <div class="lfield"><label>비밀번호</label><input class="linput" type="password" id="lpassword" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()"></div>
        <button class="lbtn" onclick="doLogin()">로그인</button>
        <div class="lerr" id="lerr"></div>
      </div>
    </div>

    <!-- HOME: 단원 선택 -->
    <div class="screen on" id="s-home">
      <div class="home-banner">
        <div class="hb-name" id="hbName">안녕하세요</div>
        <div class="hb-title">오늘도 열심히! 📚</div>
        <div class="hb-stats">
          <div class="hb-stat"><div class="n" id="hs-tot">0</div><div class="l">총 풀이</div></div>
          <div class="hb-stat"><div class="n" id="hs-ok">0</div><div class="l">정답</div></div>
          <div class="hb-stat"><div class="n" id="hs-ng">0</div><div class="l">오답</div></div>
          <div class="hb-stat"><div class="n" id="hs-rt">-</div><div class="l">정답률</div></div>
        </div>
      </div>
      <div class="sec-title">단원 선택</div>
      <div class="unit-grid" id="unitGrid"></div>
    </div>

    <!-- UNIT: 페이지 목록 -->
    <div class="screen" id="s-unit">
      <div class="quiz-header">
        <button class="back-btn" onclick="navTo('home');renderHome()">←</button>
        <div class="quiz-title" id="unitPageTitle">단원</div>
      </div>
      <div class="page-list" id="pageList"></div>
    </div>

    <!-- QUIZ: 페이지 단위 채점 -->
    <div class="screen" id="s-quiz">
      <div class="quiz-header">
        <button class="back-btn" onclick="navTo('unit')">←</button>
        <div class="quiz-title" id="qPageTitle">페이지</div>
        <div class="quiz-counter" id="qPageCounter"></div>
      </div>
      <div class="progbar"><div class="progfill" id="progFill" style="width:0%"></div></div>

      <!-- 결과 요약 (채점 후 표시) -->
      <div id="resultSummary" style="display:none;">
        <div class="result-summary">
          <div class="rs-title">📊 채점 결과</div>
          <div class="rs-grid">
            <div class="rs-card"><div class="n" id="rs-total">0</div><div class="l">전체</div></div>
            <div class="rs-card"><div class="n" id="rs-ok" style="color:var(--green)">0</div><div class="l">정답</div></div>
            <div class="rs-card"><div class="n" id="rs-ng" style="color:var(--red)">0</div><div class="l">오답</div></div>
          </div>
          <div class="rs-actions">
            <button class="rs-btn rs-btn-retry" onclick="retryPage()">🔄 다시 풀기</button>
            <button class="rs-btn rs-btn-next" onclick="nextPage()">다음 페이지 →</button>
          </div>
        </div>
      </div>

      <!-- 문제 목록 -->
      <div id="qItemsWrap"></div>

      <!-- 하단 채점 바 -->
      <div class="grade-bar">
        <div class="grade-info" id="gradeInfo">답을 선택하세요</div>
        <button class="grade-btn" id="gradeBtn" onclick="gradeAll()" disabled>채점하기</button>
      </div>
    </div>

    <!-- WRONG -->
    <div class="screen" id="s-wrong">
      <div class="wrong-banner">
        <h2 style="font-size:15px;font-weight:700;">❌ 오답 노트</h2>
        <p style="font-size:11px;opacity:.75;margin-top:2px;" id="wrongSub">틀린 문제를 복습하세요</p>
      </div>
      <div class="wrong-list" id="wrongList"></div>
    </div>

    <!-- STATS -->
    <div class="screen" id="s-stats">
      <div style="font-size:17px;font-weight:900;margin-bottom:11px;">📊 학습 통계</div>
      <div class="stats-grid">
        <div class="scard"><div class="sn" id="st-tot">0</div><div class="sl">총 풀이</div></div>
        <div class="scard"><div class="sn" id="st-rt" style="color:var(--primary)">0%</div><div class="sl">정답률</div></div>
        <div class="scard"><div class="sn" id="st-ok" style="color:var(--green)">0</div><div class="sl">정답</div></div>
        <div class="scard"><div class="sn" id="st-ng" style="color:var(--red)">0</div><div class="sl">오답</div></div>
      </div>
      <div style="font-size:12px;font-weight:700;margin-bottom:7px;">단원별 성취도</div>
      <div class="ustat-list" id="ustatList"></div>
    </div>
  </div>

  <div class="bnav">
    <button class="bn on" id="bn-home" onclick="navTo('home');renderHome()"><span class="ico">🏠</span><span>단원</span></button>
    <button class="bn" id="bn-wrong" onclick="navTo('wrong')"><span class="ico">❌</span><span>오답</span></button>
    <button class="bn" id="bn-stats" onclick="navTo('stats')"><span class="ico">📊</span><span>통계</span></button>
  </div>
</div>

<script src="choices.js"></script>
<script>
// CHOICES loaded from choices.js

// ══════════════════════════════════════
//  PAGE MAP: [pdf_page, [q_start, q_end], title]
// ══════════════════════════════════════
const PAGE_MAP=[
  [9,[38,45],"유형익히기 - 다항식 덧셈/계수구하기"],
  [10,[46,55],"유형익히기 - 곱셈공식·공통부분"],

  [12,[61,68],"유형익히기 - 변형·수의계산"],
  [13,[69,75],"유형익히기 - 나눗셈"],
  [14,[76,84],"유형익히기 - 나눗셈 심화"],
  [15,[85,96],"시험에 꼭 나오는 문제"],
  [16,[97,110],"시험에 꼭 나오는 문제 심화"],
  [20,[124,138],"유형익히기 - 항등식"],
  [21,[139,152],"유형익히기 - 나머지정리"],
  [22,[153,172],"유형익히기 - 인수정리"],
  [23,[173,195],"시험에 꼭 나오는 문제"],
  [27,[215,230],"유형익히기 - 인수분해"],
  [28,[231,248],"유형익히기 - 인수분해 심화"],
  [29,[249,264],"유형익히기 - 복잡한 인수분해"],
  [30,[265,279],"시험에 꼭 나오는 문제"],
  [34,[300,320],"유형익히기 - 복소수 연산"],
  [35,[321,345],"유형익히기 - 복소수 심화"],
  [36,[346,375],"시험에 꼭 나오는 문제"],
  [40,[396,415],"유형익히기 - 이차방정식"],
  [41,[416,443],"유형익히기 - 이차방정식 심화"],
  [42,[444,465],"유형익히기 - 판별식·근과계수"],
  [43,[466,480],"시험에 꼭 나오는 문제"],
  [47,[500,520],"유형익히기 - 이차함수"],
  [48,[521,545],"유형익히기 - 이차함수 심화"],
  [49,[546,566],"시험에 꼭 나오는 문제"],
];
(()=>{
  const unitName=n=>n>=1093?'행렬':n>=1001?'조합':n>=911?'경우의수·순열':n>=775?'이차부등식':n>=629?'연립일차부등식':'여러가지방정식';
  for(let s=567;s<=1184;s+=8){
    const e=Math.min(s+7,1184);
    PAGE_MAP.push([null,[s,e],unitName(s)]);
  }
})();(()=>{
  const unitName=n=>n>=1093?'행렬':n>=1001?'조합':n>=911?'경우의수·순열':n>=775?'이차부등식':n>=629?'연립일차부등식':'여러가지방정식';
  for(let s=567;s<=1184;s+=8){
    const e=Math.min(s+7,1184);
    PAGE_MAP.push([null,[s,e],unitName(s)]);
  }
})();

const UNITS=[
  {id:1,name:'다항식의 연산',r:[1,110],c:'#FF5722'},
  {id:2,name:'항등식과 나머지정리',r:[111,195],c:'#8E44AD'},
  {id:3,name:'인수분해',r:[196,279],c:'#2980B9'},
  {id:4,name:'복소수',r:[280,375],c:'#16A085'},
  {id:5,name:'이차방정식',r:[376,480],c:'#E67E22'},
  {id:6,name:'이차방정식과 이차함수',r:[481,566],c:'#C0392B'},
  {id:7,name:'여러 가지 방정식',r:[567,628],c:'#1ABC9C'},
  {id:8,name:'연립일차부등식',r:[629,774],c:'#F39C12'},
  {id:9,name:'이차부등식과 연립이차부등식',r:[775,910],c:'#9B59B6'},
  {id:10,name:'경우의 수와 순열',r:[911,1000],c:'#27AE60'},
  {id:11,name:'조합',r:[1001,1092],c:'#E74C3C'},
  {id:12,name:'행렬',r:[1093,1184],c:'#3498DB'},
];
const NUMS=['①','②','③','④','⑤'];
let YT_CHANNEL_ID='';
function ytUrl(n){
  const q=encodeURIComponent(`RPM 공통수학1 ${String(n).padStart(4,'0')}번 풀이`);
  return YT_CHANNEL_ID?`https://www.youtube.com/results?search_query=${q}&channel=${YT_CHANNEL_ID}`:`https://www.youtube.com/results?search_query=${q}`;
}

// ── STATE ──
let curUser=null,records={};
let curUnit=null,curUnitPages=[];  // 현재 단원의 페이지들
let curPageIdx=0;                  // 현재 페이지 인덱스 (curUnitPages 내)
let curPageQs=[];                  // 현재 페이지의 문제번호들
let userSelections={};             // { qNum: choiceIdx }
let graded=false;

// ── AUTH ──
async function doLogin(){
  const em=document.getElementById('lemail').value.trim();
  const pw=document.getElementById('lpassword').value;
  document.getElementById('lerr').textContent='';
  try{ await window._fb.signInWithEmailAndPassword(window._fb.auth,em,pw); }
  catch(e){ document.getElementById('lerr').textContent='이메일 또는 비밀번호가 올바르지 않습니다.'; }
}
async function doLogout(){ await window._fb.signOut(window._fb.auth); location.reload(); }

window.addEventListener('load',()=>{
  const {auth,onAuthStateChanged,db,doc,getDoc}=window._fb;
  onAuthStateChanged(auth,async user=>{
    if(!user){
      document.getElementById('s-login').style.display='flex';
      document.getElementById('app').style.display='none';
      return;
    }
    curUser=user;
    document.getElementById('s-login').style.display='none';
    document.getElementById('app').style.display='flex';
    document.getElementById('tbarName').textContent=user.displayName||user.email.split('@')[0];
    document.getElementById('hbName').textContent=`${user.displayName||user.email.split('@')[0]}님, 안녕하세요!`;
    await loadRecords();
    try{
      const snap=await getDoc(doc(db,'settings','youtube'));
      if(snap.exists()) YT_CHANNEL_ID=snap.data().channelId||'';
    }catch(e){}
    renderHome(); updateHeader();
  });
});

async function loadRecords(){
  const {db,doc,getDoc}=window._fb;
  try{
    const snap=await getDoc(doc(db,'students',curUser.uid,'data','records'));
    records=snap.exists()?(snap.data().records||{}):{};
  }catch(e){ records={}; }
}
async function saveRecords(batch){
  const {db,doc,setDoc,serverTimestamp}=window._fb;
  Object.assign(records,batch);
  try{ await setDoc(doc(db,'students',curUser.uid,'data','records'),{records,updatedAt:serverTimestamp()},{merge:true}); }
  catch(e){}
}

// ── NAV ──
function navTo(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.bn').forEach(b=>b.classList.remove('on'));
  document.getElementById('s-'+name).classList.add('on');
  const bnEl=document.getElementById('bn-'+name);
  if(bnEl) bnEl.classList.add('on');
  document.getElementById('scrollEl').scrollTop=0;
  if(name==='wrong') renderWrong();
  if(name==='stats') renderStats();
  updateHeader();
}

// ── HOME ──
function renderHome(){
  navTo('home');
  const all=Object.keys(records).map(Number);
  const tot=all.length,ok=all.filter(n=>records[n]?.correct===true).length;
  document.getElementById('hs-tot').textContent=tot;
  document.getElementById('hs-ok').textContent=ok;
  document.getElementById('hs-ng').textContent=tot-ok;
  document.getElementById('hs-rt').textContent=tot>0?Math.round(ok/tot*100)+'%':'-';
  const grid=document.getElementById('unitGrid'); grid.innerHTML='';
  UNITS.forEach(u=>{
    const total=u.r[1]-u.r[0]+1;
    const solved=all.filter(n=>n>=u.r[0]&&n<=u.r[1]).length;
    const okCnt=all.filter(n=>n>=u.r[0]&&n<=u.r[1]&&records[n]?.correct===true).length;
    const el=document.createElement('div'); el.className='unit-card';
    el.style.setProperty('--unit-c',u.c);
    el.innerHTML=`
      <div class="ubadge">${String(u.id).padStart(2,'0')}</div>
      <div class="uinfo">
        <div class="uname">${u.name}</div>
        <div class="urange">${u.r[0]}~${u.r[1]}번 · ${total}문제</div>
        <div class="ubar"><div class="ubar-fill" style="width:${Math.round(solved/total*100)}%"></div></div>
      </div>
      <div class="uright">
        <div class="upct">${solved>0?Math.round(okCnt/solved*100)+'%':'-'}</div>
        <div class="ucnt">${solved}/${total}</div>
      </div>`;
    el.onclick=()=>openUnit(u);
    grid.appendChild(el);
  });
}

// ── UNIT 페이지 목록 ──
function openUnit(u){
  curUnit=u;
  curUnitPages=PAGE_MAP.filter(p=>p[1][0]>=u.r[0]&&p[1][1]<=u.r[1]);
  document.getElementById('unitPageTitle').textContent=`${String(u.id).padStart(2,'0')}. ${u.name}`;
  renderPageList();
  navTo('unit');
}

function renderPageList(){
  const all=Object.keys(records).map(Number);
  const list=document.getElementById('pageList'); list.innerHTML='';
  curUnitPages.forEach((p,i)=>{
    const [pdf,[qs,qe],title]=p;
    const qNums=[];
    for(let n=qs;n<=qe;n++) qNums.push(n);
    const solved=qNums.filter(n=>records[n]).length;
    const ok=qNums.filter(n=>records[n]?.correct===true).length;
    const allDone=solved===qNums.length;
    const el=document.createElement('div');
    el.className=`page-item${allDone?' done':solved>0?' partial':''}`;
    const scoreColor=allDone&&ok===qNums.length?'var(--green)':solved>0?'var(--primary)':'var(--muted)';
    el.innerHTML=`
      <div class="pi-num">P${i+1}</div>
      <div class="pi-info">
        <div class="pi-title">${title}</div>
        <div class="pi-range">${qs}~${qe}번 · ${qNums.length}문제${pdf?` (교재 ${pdf}쪽)`:''}</div>
      </div>
      <div class="pi-right">
        <div class="pi-score" style="color:${scoreColor}">${solved>0?ok+'/'+qNums.length:'-'}</div>
        <div class="pi-cnt">${solved>0?Math.round(ok/qNums.length*100)+'%':''}</div>
      </div>`;
    el.onclick=()=>startPage(i);
    list.appendChild(el);
  });
}

// ── QUIZ - 페이지 단위 ──
function startPage(pageIdx){
  curPageIdx=pageIdx;
  const [pdf,[qs,qe],title]=curUnitPages[pageIdx];
  curPageQs=[];
  for(let n=qs;n<=qe;n++) curPageQs.push(n);
  userSelections={};
  graded=false;

  document.getElementById('qPageTitle').textContent=title;
  document.getElementById('qPageCounter').textContent=`${pageIdx+1}/${curUnitPages.length}`;
  document.getElementById('progFill').style.width=Math.round((pageIdx+1)/curUnitPages.length*100)+'%';
  document.getElementById('resultSummary').style.display='none';
  document.getElementById('gradeBtn').className='grade-btn';
  document.getElementById('gradeBtn').disabled=true;
  document.getElementById('gradeBtn').textContent='채점하기';

  renderQItems();
  navTo('quiz');
}

function renderQItems(){
  const wrap=document.getElementById('qItemsWrap'); wrap.innerHTML='';
  curPageQs.forEach(n=>{
    const cd=CHOICES[n];
    const rec=records[n];
    const item=document.createElement('div');
    item.className='q-item'+(rec?.correct===true?' correct':rec?.correct===false?' wrong':'');
    item.id=`qi-${n}`;

    const statusTxt=rec?.correct===true?'✅ 정답':rec?.correct===false?'❌ 오답':'미풀이';
    const statusCls=rec?.correct===true?'ok':rec?.correct===false?'ng':'';
    item.innerHTML=`
      <div class="q-head">
        <div class="q-head-left">
          <div class="q-num">${String(n).padStart(4,'0')}</div>
        </div>
        <div class="q-status ${statusCls}" id="qs-${n}">${statusTxt}</div>
      </div>
      <div class="q-choices" id="qc-${n}"></div>`;
    wrap.appendChild(item);

    // 선택지 렌더링
    const choiceWrap=document.getElementById(`qc-${n}`);
    if(cd){
      const row=document.createElement('div'); row.className='choice-row-q';
      cd.c.forEach((txt,i)=>{
        const btn=document.createElement('button');
        btn.className='choice-btn-q';
        btn.dataset.n=n; btn.dataset.i=i;
        // 이전 기록 반영
        if(rec&&rec.correct!==null){
          if(i===cd.a) btn.classList.add('correct');
          else if(rec.userAns===cd.c[i]&&rec.correct===false) btn.classList.add('wrong');
          btn.disabled=true;
        }
        btn.innerHTML=`<div class="cn">${NUMS[i]}</div><div class="ct">${esc(txt)}</div>`;
        btn.onclick=()=>selectQ(n,i);
        row.appendChild(btn);
      });
      choiceWrap.appendChild(row);
    } else {
      choiceWrap.innerHTML='<div style="padding:10px;font-size:12px;color:var(--muted);">교재에서 확인하세요</div>';
    }
  });
  updateGradeBar();
}

function selectQ(n,idx){
  if(graded) return;
  userSelections[n]=idx;
  // 버튼 UI 업데이트
  document.querySelectorAll(`.choice-btn-q[data-n="${n}"]`).forEach((btn,i)=>{
    btn.classList.toggle('selected', i===idx);
  });
  updateGradeBar();
}

function updateGradeBar(){
  const total=curPageQs.length;
  const answered=Object.keys(userSelections).length;
  // 이미 채점된 문제 포함
  const prevAnswered=curPageQs.filter(n=>records[n]&&records[n].correct!==null).length;
  const effectiveAnswered=answered+(prevAnswered-curPageQs.filter(n=>records[n]&&records[n].correct!==null&&userSelections[n]!==undefined).length);

  const newAnswers=curPageQs.filter(n=>!records[n]||records[n].correct===null).length;
  const myAnswers=Object.keys(userSelections).filter(n=>!records[n]||records[n].correct===null).length;

  document.getElementById('gradeInfo').innerHTML=
    `<b>${myAnswers}</b>/${newAnswers} 답 선택됨`;
  document.getElementById('gradeBtn').disabled=(myAnswers===0);
}

function gradeAll(){
  if(Object.keys(userSelections).length===0) return;
  graded=true;
  const batch={};
  let ok=0, ng=0;

  curPageQs.forEach(n=>{
    const cd=CHOICES[n];
    if(!cd) return;
    const sel=userSelections[n];
    if(sel===undefined) return; // 이미 채점된 것은 건드리지 않음

    const isOk=(sel===cd.a);
    if(isOk) ok++; else ng++;

    batch[n]={correct:isOk, userAns:cd.c[sel], correctAns:cd.c[cd.a], ts:Date.now()};

    // UI 반영
    const item=document.getElementById(`qi-${n}`);
    if(item){
      item.classList.remove('correct','wrong');
      item.classList.add(isOk?'correct':'wrong');
    }
    const statusEl=document.getElementById(`qs-${n}`);
    if(statusEl){ statusEl.textContent=isOk?'✅ 정답':'❌ 오답'; statusEl.className=`q-status ${isOk?'ok':'ng'}`; }

    document.querySelectorAll(`.choice-btn-q[data-n="${n}"]`).forEach((btn,i)=>{
      btn.classList.remove('selected');
      if(i===cd.a) btn.classList.add('correct');
      else if(i===sel&&!isOk) btn.classList.add('wrong');
      btn.disabled=true;
    });
  });

  saveRecords(batch);
  updateHeader();

  // 결과 요약
  const total=Object.keys(userSelections).length;
  document.getElementById('rs-total').textContent=total;
  document.getElementById('rs-ok').textContent=ok;
  document.getElementById('rs-ng').textContent=ng;
  document.getElementById('resultSummary').style.display='block';
  document.getElementById('gradeBtn').textContent='채점 완료 ✓';
  document.getElementById('gradeBtn').className='grade-btn done';
  document.getElementById('gradeBtn').disabled=true;
  document.getElementById('scrollEl').scrollTop=0;
}

function retryPage(){
  // 현재 페이지 기록 초기화 후 다시 풀기
  curPageQs.forEach(n=>{ delete records[n]; });
  userSelections={};
  graded=false;
  document.getElementById('resultSummary').style.display='none';
  document.getElementById('gradeBtn').className='grade-btn';
  document.getElementById('gradeBtn').disabled=true;
  document.getElementById('gradeBtn').textContent='채점하기';
  renderQItems();
}

function nextPage(){
  if(curPageIdx<curUnitPages.length-1){
    startPage(curPageIdx+1);
  } else {
    alert('🎊 단원 완료! 모든 페이지를 풀었어요!');
    renderPageList();
    navTo('unit');
  }
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── WRONG ──
function renderWrong(){
  const wrong=Object.keys(records).filter(k=>records[k]?.correct===false).map(Number).sort((a,b)=>a-b);
  document.getElementById('wrongSub').textContent=wrong.length>0?`틀린 문제 ${wrong.length}개`:'틀린 문제 없음 👍';
  const list=document.getElementById('wrongList'); list.innerHTML='';
  if(!wrong.length){ list.innerHTML='<div class="empty"><div class="ei">✅</div><p>오답 노트가 비어있어요!</p></div>'; return; }
  wrong.forEach(n=>{
    const rec=records[n];
    const u=UNITS.find(u=>n>=u.r[0]&&n<=u.r[1])||{name:'?'};
    const el=document.createElement('div'); el.className='wi';
    el.innerHTML=`
      <div class="wi-top"><span class="wi-num">문항 ${String(n).padStart(4,'0')}</span><span class="wi-unit">${u.name}</span></div>
      <div class="wi-ans">내 답: <span class="m">${esc(rec.userAns||'?')}</span> → 정답: <span class="c">${esc(rec.correctAns||'?')}</span></div>
      <div class="wi-btns">
        <a class="wibtn wibtn-yt" href="${ytUrl(n)}" target="_blank">▶ 해설</a>
      </div>`;
    list.appendChild(el);
  });
}

// ── STATS ──
function renderStats(){
  const all=Object.keys(records).map(Number);
  const tot=all.length,ok=all.filter(n=>records[n]?.correct===true).length;
  const ng=all.filter(n=>records[n]?.correct===false).length;
  document.getElementById('st-tot').textContent=tot;
  document.getElementById('st-ok').textContent=ok;
  document.getElementById('st-ng').textContent=ng;
  document.getElementById('st-rt').textContent=tot>0?Math.round(ok/tot*100)+'%':'0%';
  const ul=document.getElementById('ustatList'); ul.innerHTML='';
  UNITS.forEach(u=>{
    const nums=all.filter(n=>n>=u.r[0]&&n<=u.r[1]);
    const c=nums.filter(n=>records[n]?.correct===true).length;
    const t=nums.length,total=u.r[1]-u.r[0]+1;
    const el=document.createElement('div'); el.className='ustat';
    el.innerHTML=`
      <div class="ustat-top"><span>${String(u.id).padStart(2,'0')} ${u.name}</span><span style="color:${u.c}">${t}/${total} · ${t>0?Math.round(c/t*100):0}%</span></div>
      <div class="ustat-bar"><div class="ustat-fill" style="width:${Math.round(t/total*100)}%;background:${u.c}"></div></div>`;
    ul.appendChild(el);
  });
}

function updateHeader(){
  const all=Object.keys(records).map(Number);
  document.getElementById('hc').textContent=all.filter(n=>records[n]?.correct===true).length;
  document.getElementById('hw').textContent=all.filter(n=>records[n]?.correct===false).length;
}
</script>
</body>
