<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RPM 관리자</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;background:#f0f3f8;color:#1a1d2e;min-height:100vh}
.topbar{background:#1a1d2e;padding:0 16px;height:50px;display:flex;align-items:center;justify-content:space-between}
.tl{font-size:18px;font-weight:900;color:#ff4d1c;letter-spacing:2px}
.tbtn{background:none;border:1px solid rgba(255,255,255,.3);border-radius:6px;padding:4px 10px;color:rgba(255,255,255,.7);font-size:11px;cursor:pointer;font-family:sans-serif}

/* 로그인 */
#login{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 50px);padding:20px}
.card{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:340px;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.card h2{font-size:18px;margin-bottom:16px;color:#1a1d2e}
label{display:block;font-size:11px;font-weight:700;color:#8b95a7;margin-bottom:4px}
input[type=email],input[type=password]{width:100%;border:2px solid #e8ecf4;border-radius:8px;padding:10px;font-size:14px;font-family:sans-serif;outline:none;margin-bottom:10px}
input:focus{border-color:#ff4d1c}
.btn{width:100%;background:#ff4d1c;color:#fff;border:none;border-radius:8px;padding:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:sans-serif}
.err{font-size:12px;color:#ff3b5c;text-align:center;margin-top:6px;min-height:14px}

/* 대시보드 */
#dashboard{display:none;padding:16px}
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.scard{background:#fff;border-radius:12px;padding:14px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.scard .n{font-size:32px;font-weight:900;line-height:1;color:#ff4d1c}
.scard .l{font-size:11px;color:#8b95a7;margin-top:2px}

/* 필터/검색 */
.controls{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.controls input[type=text]{flex:1;min-width:150px;border:2px solid #e8ecf4;border-radius:8px;padding:8px 10px;font-size:13px;font-family:sans-serif;outline:none}
.controls input:focus{border-color:#ff4d1c}
.rbtn{background:#1a1d2e;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:sans-serif}
.rbtn.sec{background:#e8ecf4;color:#1a1d2e}

/* 학생 목록 */
.stitle{font-size:13px;font-weight:700;margin-bottom:8px;padding-left:8px;border-left:3px solid #ff4d1c}
.student-card{background:#fff;border-radius:12px;padding:14px;margin-bottom:8px;box-shadow:0 2px 6px rgba(0,0,0,.05);cursor:pointer;border:2px solid transparent;transition:border-color .15s}
.student-card:hover{border-color:#ff4d1c}
.sc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sc-name{font-size:14px;font-weight:700}
.sc-email{font-size:11px;color:#8b95a7}
.sc-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.ss{background:#f0f3f8;border-radius:7px;padding:7px;text-align:center}
.ss .n{font-size:16px;font-weight:900;line-height:1}
.ss .l{font-size:9px;color:#8b95a7;margin-top:1px}
.sc-bar-wrap{margin-top:8px}
.sc-bar-label{display:flex;justify-content:space-between;font-size:10px;color:#8b95a7;margin-bottom:3px}
.sc-bar{height:4px;background:#e8ecf4;border-radius:2px;overflow:hidden}
.sc-bar-fill{height:100%;background:linear-gradient(90deg,#ff4d1c,#ffb800);border-radius:2px}
.updated{font-size:10px;color:#8b95a7;margin-top:4px}

/* 단원별 상세 */
.unit-progress{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:8px}
.up{background:#f8f9fc;border-radius:8px;padding:8px 10px}
.up-name{font-size:10px;font-weight:700;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.up-bar{height:3px;background:#e8ecf4;border-radius:2px;overflow:hidden;margin-bottom:2px}
.up-fill{height:100%;border-radius:2px}
.up-stat{font-size:10px;color:#8b95a7}

.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700}
.badge.good{background:#edfff5;color:#26d07c}
.badge.mid{background:#fff3e0;color:#f39c12}
.badge.low{background:#fff5f7;color:#ff3b5c}
.badge.none{background:#f0f3f8;color:#8b95a7}

.loading{text-align:center;padding:40px;color:#8b95a7;font-size:14px}
.empty{text-align:center;padding:40px;color:#8b95a7;font-size:13px}

/* 상세 모달 */
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;overflow-y:auto;padding:20px}
.modal-card{background:#fff;border-radius:16px;padding:20px;max-width:600px;margin:0 auto}
.modal-title{font-size:16px;font-weight:900;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.close-btn{background:none;border:none;font-size:20px;cursor:pointer;color:#8b95a7}
</style>
</head>
<body>
<div class="topbar">
  <div class="tl">RPM 관리자</div>
  <div style="display:flex;gap:8px;align-items:center">
    <span id="adminName" style="font-size:11px;color:rgba(255,255,255,.6)"></span>
    <button class="tbtn" id="loutbtn" style="display:none">로그아웃</button>
  </div>
</div>

<div id="login">
  <div class="card">
    <h2>관리자 로그인</h2>
    <label>이메일</label>
    <input type="email" id="em" placeholder="teacher@school.com">
    <label>비밀번호</label>
    <input type="password" id="pw" placeholder="비밀번호">
    <button class="btn" id="lbtn">로그인</button>
    <div class="err" id="err"></div>
  </div>
</div>

<div id="dashboard">
  <div class="summary">
    <div class="scard"><div class="n" id="tot-students">0</div><div class="l">학생 수</div></div>
    <div class="scard"><div class="n" id="tot-solved">0</div><div class="l">평균 풀이</div></div>
    <div class="scard"><div class="n" id="tot-rate" style="color:#26d07c">0%</div><div class="l">평균 정답률</div></div>
  </div>
  <div class="controls">
    <input type="text" id="search" placeholder="학생 이름/이메일 검색...">
    <button class="rbtn" id="refreshbtn">새로고침</button>
    <button class="rbtn sec" id="sortbtn">정답률순</button>
  </div>
  <div class="stitle" id="list-title">학생 목록</div>
  <div id="student-list"></div>
</div>

<div id="modal">
  <div class="modal-card">
    <div class="modal-title">
      <span id="modal-name">학생 상세</span>
      <button class="close-btn" id="modal-close">&#10006;</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
var UNITS=[
  {id:1,name:'다항식의 연산',r:[1,110],c:'#FF5722'},
  {id:2,name:'항등식과 나머지정리',r:[111,195],c:'#8E44AD'},
  {id:3,name:'인수분해',r:[196,279],c:'#2980B9'},
  {id:4,name:'복소수',r:[280,375],c:'#16A085'},
  {id:5,name:'이차방정식',r:[376,480],c:'#E67E22'},
  {id:6,name:'이차방정식과 이차함수',r:[481,566],c:'#C0392B'},
  {id:7,name:'여러 가지 방정식',r:[567,628],c:'#1ABC9C'},
  {id:8,name:'연립일차부등식',r:[629,774],c:'#F39C12'},
  {id:9,name:'이차부등식',r:[775,910],c:'#9B59B6'},
  {id:10,name:'경우의 수와 순열',r:[911,1000],c:'#27AE60'},
  {id:11,name:'조합',r:[1001,1092],c:'#E74C3C'},
  {id:12,name:'행렬',r:[1093,1184],c:'#3498DB'}
];

// 관리자 계정 목록 (이메일로 관리자 판별)
var ADMIN_EMAILS = ['admin@rpm.com', 'teacher@school.com'];

var FB = null, FBauth = null;
var allStudents = [];
var sortByRate = false;

// Firebase 초기화
function initFB() {
  firebase.initializeApp({
    apiKey:"AIzaSyARHy35Dd2n0Fw1sUs-U4zY0BY9WVneMJ4",
    authDomain:"rpm-57f1a.firebaseapp.com",
    projectId:"rpm-57f1a",
    storageBucket:"rpm-57f1a.firebasestorage.app",
    messagingSenderId:"681087068656",
    appId:"1:681087068656:web:68c9d3ef6df32dceb89535"
  });
  FB = firebase.firestore();
  FBauth = firebase.auth();
}

function doLogin() {
  var em = document.getElementById('em').value.trim();
  var pw = document.getElementById('pw').value;
  var err = document.getElementById('err');
  if (!em || !pw) { err.textContent = '이메일과 비밀번호를 입력하세요'; return; }
  err.textContent = '로그인 중...';
  
  FBauth.signInWithEmailAndPassword(em, pw)
    .then(function(cred) {
      err.textContent = '';
      var user = cred.user;
      document.getElementById('login').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      document.getElementById('adminName').textContent = user.email;
      document.getElementById('loutbtn').style.display = 'block';
      loadStudents();
    })
    .catch(function(e) {
      err.textContent = '로그인 실패: ' + e.message;
    });
}

function doLogout() {
  FBauth.signOut().then(function() {
    document.getElementById('login').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('loutbtn').style.display = 'none';
    document.getElementById('adminName').textContent = '';
    allStudents = [];
  });
}

function loadStudents() {
  var list = document.getElementById('student-list');
  list.innerHTML = '<div class="loading">학생 데이터 불러오는 중...</div>';
  
  FB.collection('students').get().then(function(snap) {
    allStudents = [];
    snap.forEach(function(doc) {
      var d = doc.data();
      var recs = d.records || {};
      var keys = Object.keys(recs).map(Number);
      var tot = keys.length;
      var ok = keys.filter(function(n){return recs[n]&&recs[n].correct===true;}).length;
      allStudents.push({
        id: doc.id,
        email: d.email || doc.id,
        name: d.name || doc.id,
        records: recs,
        tot: tot,
        ok: ok,
        rate: tot > 0 ? Math.round(ok/tot*100) : 0,
        updatedAt: d.updatedAt
      });
    });
    renderStudents();
    renderSummary();
  }).catch(function(e) {
    list.innerHTML = '<div class="empty">데이터 로드 실패: ' + e.message + '</div>';
  });
}

function renderSummary() {
  document.getElementById('tot-students').textContent = allStudents.length;
  if (allStudents.length === 0) return;
  var avgSolved = Math.round(allStudents.reduce(function(s,st){return s+st.tot;},0) / allStudents.length);
  var avgRate = Math.round(allStudents.reduce(function(s,st){return s+st.rate;},0) / allStudents.length);
  document.getElementById('tot-solved').textContent = avgSolved;
  document.getElementById('tot-rate').textContent = avgRate + '%';
}

function renderStudents() {
  var query = document.getElementById('search').value.toLowerCase();
  var filtered = allStudents.filter(function(s) {
    return !query || s.name.toLowerCase().includes(query) || s.email.toLowerCase().includes(query);
  });
  
  if (sortByRate) {
    filtered.sort(function(a,b){return b.rate - a.rate;});
  } else {
    filtered.sort(function(a,b){return a.name.localeCompare(b.name);});
  }
  
  document.getElementById('list-title').textContent = '학생 목록 (' + filtered.length + '명)';
  var list = document.getElementById('student-list');
  list.innerHTML = '';
  
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">학생이 없거나 아직 아무도 로그인하지 않았어요</div>';
    return;
  }
  
  filtered.forEach(function(s) {
    var rateCls = s.rate >= 70 ? 'good' : s.rate >= 40 ? 'mid' : s.tot > 0 ? 'low' : 'none';
    var rateLabel = s.tot > 0 ? s.rate + '%' : '미학습';
    
    // 단원별 진도
    var unitBars = UNITS.map(function(u) {
      var total = u.r[1] - u.r[0] + 1;
      var keys = Object.keys(s.records).map(Number).filter(function(n){return n>=u.r[0]&&n<=u.r[1];});
      var solved = keys.length;
      var ok = keys.filter(function(n){return s.records[n]&&s.records[n].correct===true;}).length;
      var pct = Math.round(solved/total*100);
      var ratePct = solved > 0 ? Math.round(ok/solved*100) : 0;
      return '<div class="up"><div class="up-name">'+u.id+'. '+u.name+'</div>'+
        '<div class="up-bar"><div class="up-fill" style="width:'+pct+'%;background:'+u.c+'"></div></div>'+
        '<div class="up-stat">'+solved+'/'+total+' · '+(solved>0?ratePct+'%':'-')+'</div></div>';
    }).join('');
    
    var updStr = '';
    if (s.updatedAt && s.updatedAt.toDate) {
      var d = s.updatedAt.toDate();
      updStr = d.getFullYear()+'.'+(d.getMonth()+1).toString().padStart(2,'0')+'.'+d.getDate().toString().padStart(2,'0');
    }
    
    var el = document.createElement('div');
    el.className = 'student-card';
    el.innerHTML = 
      '<div class="sc-top">'+
        '<div><div class="sc-name">'+s.name+'</div><div class="sc-email">'+s.email+'</div></div>'+
        '<span class="badge '+rateCls+'">'+rateLabel+'</span>'+
      '</div>'+
      '<div class="sc-stats">'+
        '<div class="ss"><div class="n">'+s.tot+'</div><div class="l">총 풀이</div></div>'+
        '<div class="ss"><div class="n" style="color:#26d07c">'+s.ok+'</div><div class="l">정답</div></div>'+
        '<div class="ss"><div class="n" style="color:#ff3b5c">'+(s.tot-s.ok)+'</div><div class="l">오답</div></div>'+
        '<div class="ss"><div class="n" style="color:#ffb800">'+s.rate+'%</div><div class="l">정답률</div></div>'+
      '</div>'+
      '<div class="sc-bar-wrap">'+
        '<div class="sc-bar-label"><span>학습 진도</span><span>'+s.tot+'/1134문제</span></div>'+
        '<div class="sc-bar"><div class="sc-bar-fill" style="width:'+Math.round(s.tot/1134*100)+'%"></div></div>'+
      '</div>'+
      '<div class="unit-progress">'+unitBars+'</div>'+
      (updStr ? '<div class="updated">마지막 학습: '+updStr+'</div>' : '');
    el.addEventListener('click', function(){showModal(s);});
    list.appendChild(el);
  });
}

function showModal(s) {
  document.getElementById('modal-name').textContent = s.name + ' (' + s.email + ')';
  
  // 오답 목록
  var wrong = Object.keys(s.records).map(Number).filter(function(n){return s.records[n]&&s.records[n].correct===false;}).sort(function(a,b){return a-b;});
  
  var wrongHtml = '';
  if (wrong.length > 0) {
    wrongHtml = '<div style="margin-top:16px"><div style="font-size:13px;font-weight:700;margin-bottom:8px;color:#ff3b5c">오답 목록 ('+wrong.length+'개)</div>';
    wrongHtml += '<div style="display:flex;flex-wrap:wrap;gap:6px">';
    wrong.forEach(function(n) {
      wrongHtml += '<span style="background:#fff5f7;border:1px solid #ff3b5c;border-radius:6px;padding:3px 8px;font-size:11px;color:#ff3b5c">' + String(n).padStart(4,'0') + '번</span>';
    });
    wrongHtml += '</div></div>';
  }
  
  document.getElementById('modal-body').innerHTML = 
    '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px">'+
      '<div class="ss"><div class="n">'+s.tot+'</div><div class="l">총 풀이</div></div>'+
      '<div class="ss"><div class="n" style="color:#26d07c">'+s.ok+'</div><div class="l">정답</div></div>'+
      '<div class="ss"><div class="n" style="color:#ff3b5c">'+(s.tot-s.ok)+'</div><div class="l">오답</div></div>'+
      '<div class="ss"><div class="n" style="color:#ffb800">'+s.rate+'%</div><div class="l">정답률</div></div>'+
    '</div>' + wrongHtml;
  
  document.getElementById('modal').style.display = 'block';
}

// 이벤트
document.getElementById('lbtn').addEventListener('click', doLogin);
document.getElementById('pw').addEventListener('keydown', function(e){if(e.key==='Enter')doLogin();});
document.getElementById('loutbtn').addEventListener('click', doLogout);
document.getElementById('refreshbtn').addEventListener('click', loadStudents);
document.getElementById('sortbtn').addEventListener('click', function(){
  sortByRate = !sortByRate;
  this.textContent = sortByRate ? '이름순' : '정답률순';
  renderStudents();
});
document.getElementById('search').addEventListener('input', renderStudents);
document.getElementById('modal-close').addEventListener('click', function(){document.getElementById('modal').style.display='none';});
document.getElementById('modal').addEventListener('click', function(e){if(e.target===this) this.style.display='none';});
</script>

<!-- Firebase SDK (PC 관리자 페이지는 안정적으로 로드) -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js" onload="initFB()"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</body>
</html>
