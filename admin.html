<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>태산학원</title>
<!-- Firebase SDK를 head에서 먼저 로드 (동기) -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;background:#f0f3f8;color:#1a1d2e;min-height:100vh}
.topbar{background:#1a1d2e;padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:2px solid #D42027}
.tl{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:900;color:#fff;letter-spacing:2px}
.tl-icon{width:28px;height:28px;background:#D42027;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#fff;font-family:sans-serif}
.tl span{color:#D42027}
.tr{display:flex;align-items:center;gap:8px}
.tname{font-size:11px;color:rgba(255,255,255,.6)}
.tbtn{background:none;border:1px solid rgba(255,255,255,.3);border-radius:6px;padding:4px 10px;color:rgba(255,255,255,.7);font-size:11px;cursor:pointer;font-family:sans-serif}
#login{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 52px);padding:20px;background:linear-gradient(160deg,#1a1d2e 0%,#2c1f1f 50%,#1a1d2e 100%)}
.card{background:rgba(255,255,255,.97);border-radius:20px;padding:32px 28px 28px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.login-logo-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:24px}
.login-emblem{width:68px;height:68px;background:#D42027;border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;box-shadow:0 4px 16px rgba(212,32,39,.35);font-size:36px;font-weight:900;color:#fff;font-family:sans-serif}
.login-brand{font-size:26px;font-weight:900;color:#1a1d2e;letter-spacing:3px;line-height:1}
.login-brand span{color:#D42027}
.login-sub{font-size:11px;color:#8b95a7;margin-top:4px;letter-spacing:.5px}
.login-badge{background:#fff3f3;border:1px solid #ffdcdc;border-radius:20px;padding:3px 12px;font-size:10px;font-weight:700;color:#D42027;margin-top:8px;letter-spacing:.5px}
.login-divider{height:1px;background:#e8ecf4;margin-bottom:20px}

label{display:block;font-size:11px;font-weight:700;color:#8b95a7;margin-bottom:4px}
input{width:100%;border:2px solid #e8ecf4;border-radius:10px;padding:11px 13px;font-size:14px;font-family:sans-serif;outline:none;margin-bottom:10px;color:#1a1d2e;transition:border-color .2s}
input:focus{border-color:#D42027}
.btn{width:100%;background:#D42027;color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:800;cursor:pointer;font-family:sans-serif;letter-spacing:1px;box-shadow:0 4px 14px rgba(212,32,39,.35);transition:opacity .15s}
.btn:active{opacity:.85}
.btn:disabled{background:#ccc;cursor:not-allowed;box-shadow:none}
.err{font-size:12px;color:#D42027;text-align:center;margin-top:6px;min-height:16px}
#dashboard{display:none;padding:16px;max-width:900px;margin:0 auto}
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.scard{background:#fff;border-radius:12px;padding:14px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.scard .n{font-size:30px;font-weight:900;line-height:1;color:#D42027}
.scard .l{font-size:11px;color:#8b95a7;margin-top:2px}
.controls{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.controls input{flex:1;min-width:150px;margin-bottom:0}
.rbtn{background:#1a1d2e;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:sans-serif;white-space:nowrap}
.rbtn.sec{background:#e8ecf4;color:#1a1d2e}
.stitle{font-size:13px;font-weight:700;margin-bottom:8px;padding-left:8px;border-left:3px solid #ff4d1c}
.sc2{background:#fff;border-radius:12px;padding:14px;margin-bottom:8px;box-shadow:0 2px 6px rgba(0,0,0,.05)}
.sc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sc-name{font-size:14px;font-weight:700}
.sc-email{font-size:11px;color:#8b95a7}
.sc-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px}
.ss{background:#f0f3f8;border-radius:7px;padding:7px;text-align:center}
.ss .n{font-size:15px;font-weight:900;line-height:1}
.ss .l{font-size:9px;color:#8b95a7;margin-top:1px}
.sc-bar{height:4px;background:#e8ecf4;border-radius:2px;overflow:hidden;margin-bottom:6px}
.sc-bar-fill{height:100%;background:linear-gradient(90deg,#ff4d1c,#ffb800);border-radius:2px}
.unit-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px}
@media(min-width:600px){.unit-grid{grid-template-columns:repeat(3,1fr)}}
.up{background:#f8f9fc;border-radius:7px;padding:7px 9px}
.up-name{font-size:10px;font-weight:700;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.up-bar{height:3px;background:#e8ecf4;border-radius:2px;overflow:hidden;margin-bottom:2px}
.up-fill{height:100%;border-radius:2px}
.up-stat{font-size:10px;color:#8b95a7}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.badge.good{background:#edfff5;color:#26d07c}
.badge.mid{background:#fff3e0;color:#f39c12}
.badge.low{background:#fff5f7;color:#ff3b5c}
.badge.none{background:#f0f3f8;color:#8b95a7}
.updated{font-size:10px;color:#8b95a7;margin-top:4px}
.loading,.empty{text-align:center;padding:40px;color:#8b95a7;font-size:13px}
/* 탭 */
.tabs{display:flex;gap:0;margin-bottom:16px;background:#fff;border-radius:12px;padding:4px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.tab-btn{flex:1;padding:9px;border:none;background:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:sans-serif;color:#8b95a7;transition:all .2s}
.tab-btn.active{background:#D42027;color:#fff}
/* 유튜브 관리 */
#yt-panel{display:none;padding-bottom:40px}
.yt-filter{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.yt-filter input{flex:1;min-width:150px;margin-bottom:0}
.yt-filter select{border:2px solid #e8ecf4;border-radius:8px;padding:8px 10px;font-size:13px;font-family:sans-serif;outline:none;color:#1a1d2e}
.yt-filter select:focus{border-color:#D42027}
.yt-row{background:#fff;border-radius:10px;padding:12px 14px;margin-bottom:6px;box-shadow:0 1px 4px rgba(0,0,0,.06);display:flex;align-items:center;gap:10px}
.yt-num{font-size:13px;font-weight:900;color:#1a1d2e;min-width:48px}
.yt-unit-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;color:#fff;white-space:nowrap}
.yt-input-wrap{flex:1;display:flex;gap:6px;align-items:center}
.yt-url-inp{flex:1;border:2px solid #e8ecf4;border-radius:8px;padding:8px 10px;font-size:12px;font-family:sans-serif;outline:none;min-width:0}
.yt-url-inp:focus{border-color:#D42027}
.yt-url-inp.has-link{border-color:#26d07c;background:#f0fff8}
.yt-save-btn{background:#D42027;color:#fff;border:none;border-radius:7px;padding:7px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:sans-serif;white-space:nowrap}
.yt-save-btn:disabled{background:#ccc;cursor:not-allowed}
.yt-preview-btn{background:#f0f3f8;border:none;border-radius:7px;padding:7px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:sans-serif;color:#1a1d2e;white-space:nowrap}
.yt-status{font-size:10px;color:#26d07c;min-width:28px;text-align:center}
.yt-summary{background:#fff;border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.yt-sum-item{text-align:center}
.yt-sum-n{font-size:22px;font-weight:900;color:#D42027;line-height:1}
.yt-sum-l{font-size:10px;color:#8b95a7;margin-top:2px}
.yt-bulk-btn{background:#1a1d2e;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:sans-serif}
/* 학생 관리 모달 */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal-bg.hide{display:none}
.modal{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(0,0,0,.2)}
.modal h3{font-size:16px;font-weight:900;margin-bottom:16px}
.modal label{display:block;font-size:11px;font-weight:700;color:#8b95a7;margin-bottom:4px;margin-top:10px}
.modal input{width:100%;border:2px solid #e8ecf4;border-radius:8px;padding:10px;font-size:14px;font-family:sans-serif;outline:none;margin-bottom:2px}
.modal input:focus{border-color:#D42027}
.modal-err{font-size:12px;color:#ff3b5c;min-height:16px;margin-top:4px}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.modal-btns button{flex:1;padding:11px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:sans-serif}
.mbtn-ok{background:#ff4d1c;color:#fff}
.mbtn-ok:disabled{background:#ccc;cursor:not-allowed}
.mbtn-cancel{background:#e8ecf4;color:#1a1d2e}
/* 삭제 버튼 */
.del-btn{background:#fff5f7;border:1px solid #ffd0d8;color:#ff3b5c;border-radius:7px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:sans-serif}
.del-btn:hover{background:#ffd0d8}
.add-btn{background:#ff4d1c;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:sans-serif;white-space:nowrap}
</style>
</head>

      <div style="font-size:15px;font-weight:900;margin-bottom:16px">Gemini AI 해설 설정</div>
      <p style="font-size:12px;color:#8b95a7;margin-bottom:14px;line-height:1.6">여기에 입력한 API 키는 Firebase에 저장되어 모든 학생이 공유합니다. 학생들은 별도로 키를 입력할 필요가 없습니다.</p>

      <input type="password" id="gemini-key-input" placeholder="AIzaSy..." style="width:100%;border:2px solid #e8ecf4;border-radius:10px;padding:11px 13px;font-size:14px;font-family:sans-serif;outline:none;margin-bottom:10px;color:#1a1d2e">
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
        <button onclick="saveGeminiKey()" style="background:#D42027;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:sans-serif">저장</button>
        <button onclick="toggleShowKey()" style="background:#e8ecf4;color:#1a1d2e;border:none;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:sans-serif" id="show-key-btn">보기</button>
        <button onclick="deleteGeminiKey()" style="background:#fff5f7;color:#ff3b5c;border:1px solid #ffd0d8;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:sans-serif">삭제</button>
      </div>
      <div id="gemini-status" style="font-size:12px;min-height:16px;color:#26d07c"></div>

function doLogin() {
  var em = document.getElementById('em').value.trim();

function loadStudents() {
  document.getElementById('slist').innerHTML = '<div class="loading">데이터 불러오는 중...</div>';
  DB.collection('students').get().then(function(snap) {
    students = [];
    snap.forEach(function(doc) {
      var d = doc.data();
      var recs = d.records || {};
      var keys = Object.keys(recs).map(Number);
      var tot = keys.length;
      var ok = keys.filter(function(n){return recs[n]&&recs[n].correct===true;}).length;
      students.push({
        id: doc.id,
        email: d.email || doc.id,
        name: d.name || (d.email ? d.email.split('@')[0] : doc.id),
        records: recs,
        tot: tot,
        ok: ok,
        rate: tot > 0 ? Math.round(ok/tot*100) : 0,
        updatedAt: d.updatedAt
      });
    });
    renderSummary();
    renderList();
  }).catch(function(e) {
    document.getElementById('slist').innerHTML = '<div class="empty">로드 실패: ' + e.message + '<br><small>Firestore 보안 규칙을 확인해주세요</small></div>';
  });
}

function renderSummary() {
  document.getElementById('tot0').textContent = students.length;
  if (!students.length) return;
  var avgS = Math.round(students.reduce(function(s,st){return s+st.tot;},0)/students.length);
  var avgR = Math.round(students.reduce(function(s,st){return s+st.rate;},0)/students.length);
  document.getElementById('tot1').textContent = avgS;
  document.getElementById('tot2').textContent = avgR + '%';
}

function toggleSort() {
  sortByRate = !sortByRate;

}

function renderList() {
  var q = document.getElementById('search').value.toLowerCase();
  var list = students.filter(function(s) {
    return !q || s.name.toLowerCase().includes(q) || s.email.toLowerCase().includes(q);
  });
  if (sortByRate) list.sort(function(a,b){return b.rate-a.rate;});
  else list.sort(function(a,b){return a.name.localeCompare(b.name);});

  document.getElementById('listtitle').textContent = '학생 목록 (' + list.length + '명)';
  var el = document.getElementById('slist');
  el.innerHTML = '';

  if (!list.length) {
    el.innerHTML = '<div class="empty">학생이 없거나 아직 아무도 접속하지 않았어요</div>';
    return;
  }

  list.forEach(function(s) {
    var cls = s.rate>=70?'good':s.rate>=40?'mid':s.tot>0?'low':'none';
    var label = s.tot>0 ? s.rate+'%' : '미학습';
    var progPct = Math.round(s.tot/1134*100);

    var unitHtml = UNITS.map(function(u) {
      var total = u.r[1]-u.r[0]+1;
      var ks = Object.keys(s.records).map(Number).filter(function(n){return n>=u.r[0]&&n<=u.r[1];});
      var sv = ks.length;
      var ok = ks.filter(function(n){return s.records[n]&&s.records[n].correct===true;}).length;
      return '<div class="up">'+
        '<div class="up-name">'+u.id+'. '+u.name+'</div>'+
        '<div class="up-bar"><div class="up-fill" style="width:'+Math.round(sv/total*100)+'%;background:'+u.c+'"></div></div>'+
        '<div class="up-stat">'+sv+'/'+total+(sv>0?' ('+Math.round(ok/sv*100)+'%)':'')+'</div>'+
        '</div>';
    }).join('');

    var upd = '';
    if (s.updatedAt && s.updatedAt.toDate) {
      var d = s.updatedAt.toDate();
      upd = d.getFullYear()+'.'+(d.getMonth()+1).toString().padStart(2,'0')+'.'+d.getDate().toString().padStart(2,'0');
    }

    var div = document.createElement('div');
    div.className = 'sc2';
    div.innerHTML =
      '<div class="sc-top">'+
        '<div><div class="sc-name">'+s.name+'</div><div class="sc-email">'+s.email+'</div></div>'+
        '<div style="display:flex;align-items:center;gap:6px">'+
          '<span class="badge '+cls+'">'+label+'</span>'+
          '<button class="del-btn" data-sid="'+s.id+'" data-sname="'+s.name+'" data-semail="'+s.email+'" onclick="delBtnClick(this)">&#215; 삭제</button>'+
        '</div>'+
      '</div>'+
      '<div class="sc-stats">'+
        '<div class="ss"><div class="n">'+s.tot+'</div><div class="l">총 풀이</div></div>'+
        '<div class="ss"><div class="n" style="color:#26d07c">'+s.ok+'</div><div class="l">정답</div></div>'+
        '<div class="ss"><div class="n" style="color:#ff3b5c">'+(s.tot-s.ok)+'</div><div class="l">오답</div></div>'+
        '<div class="ss"><div class="n" style="color:#ffb800">'+s.rate+'%</div><div class="l">정답률</div></div>'+
      '</div>'+
      '<div style="font-size:10px;color:#8b95a7;margin-bottom:3px">전체 진도 '+progPct+'%</div>'+
      '<div class="sc-bar"><div class="sc-bar-fill" style="width:'+progPct+'%"></div></div>'+
      '<div class="unit-grid">'+unitHtml+'</div>'+
      (upd?'<div class="updated">마지막 학습: '+upd+'</div>':'');
    el.appendChild(div);
  });
}

// ── 유튜브 링크 관리 ──
var ytLinks={};
var ytLoaded=false;
var ytDirty={};  // 변경된 항목 추적

// 단원 필터 초기화
(function(){
  var sel=document.getElementById('yt-unit-filter');
  UNITS.forEach(function(u){
    var opt=document.createElement('option');
    opt.value=u.id;
    opt.textContent=u.id+'. '+u.name;
    sel.appendChild(opt);
  });
})();

function loadYtLinks(){
  document.getElementById('yt-list').innerHTML='<div class="loading">링크 데이터 불러오는 중...</div>';
  DB.collection('settings').doc('ytlinks').get().then(function(doc){
    ytLinks = doc.exists ? (doc.data().links||{}) : {};
    ytLoaded=true;
    ytDirty={};
    renderYtList();
    updateYtSummary();
  }).catch(function(e){
    document.getElementById('yt-list').innerHTML='<div class="empty">불러오기 실패: '+e.message+'</div>';
  });
}

function updateYtSummary(){
  var linked=Object.keys(ytLinks).filter(function(k){return ytLinks[k]&&ytLinks[k].trim();}).length;
  document.getElementById('yt-linked').textContent=linked;
  document.getElementById('yt-pct').textContent=Math.round(linked/1184*100)+'%';
  document.getElementById('yt-pct').style.color=linked>0?'#D42027':'#8b95a7';
}

function getUnitForNum(n){
  for(var i=0;i<UNITS.length;i++){
    if(n>=UNITS[i].r[0]&&n<=UNITS[i].r[1]) return UNITS[i];
  }
  return null;
}

function renderYtList(){
  var q=(document.getElementById('yt-search').value||'').trim();
  var unitF=document.getElementById('yt-unit-filter').value;
  var linkF=document.getElementById('yt-link-filter').value;

  var nums=[];
  for(var i=1;i<=1184;i++){
    var u=getUnitForNum(i);
    if(unitF && (!u||String(u.id)!==unitF)) continue;
    if(q && String(i).indexOf(q)===-1) continue;
    var hasLink=!!(ytLinks[i]&&ytLinks[i].trim());
    if(linkF==='linked'&&!hasLink) continue;
    if(linkF==='empty'&&hasLink) continue;
    nums.push(i);
  }

  var el=document.getElementById('yt-list');
  if(!nums.length){el.innerHTML='<div class="empty">조건에 맞는 문항이 없습니다</div>';return;}

  // 가상화: 최대 200개만 표시
  var showing=nums.slice(0,200);
  var html='';
  showing.forEach(function(n){
    var u=getUnitForNum(n);
    var url=ytLinks[n]||'';
    var hasLink=!!(url&&url.trim());
    html+='<div class="yt-row">'+
      '<div class="yt-num">'+String(n).padStart(4,'0')+'번</div>'+
      (u?'<div class="yt-unit-tag" style="background:'+u.c+'">'+u.id+'단원</div>':'')+
      '<div class="yt-input-wrap">'+
        '<input class="yt-url-inp'+(hasLink?' has-link':'')+'" id="yti-'+n+'" placeholder="유튜브 링크 붙여넣기..." value="'+escHtml(url)+'" oninput="markDirty('+n+')">'+
        (hasLink?'<button class="yt-preview-btn" onclick="previewYt('+n+')">▶</button>':'')+
        '<button class="yt-save-btn" id="yts-'+n+'" onclick="saveSingleYt('+n+')">저장</button>'+
      '</div>'+
      '<div class="yt-status" id="ytst-'+n+'">'+(hasLink?'✓':'')+'</div>'+
    '</div>';
  });
  if(nums.length>200) html+='<div class="empty" style="padding:16px">'+nums.length+'개 중 200개 표시 중. 검색으로 범위를 좁혀주세요.</div>';
  el.innerHTML=html;
}

function escHtml(s){return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;');}

function markDirty(n){
  ytDirty[n]=true;
  var inp=document.getElementById('yti-'+n);
  var hasLink=!!(inp&&inp.value.trim());
  if(inp) inp.className='yt-url-inp'+(hasLink?' has-link':'');
}

function saveSingleYt(n){
  var inp=document.getElementById('yti-'+n);
  var url=(inp?inp.value.trim():'');
  var btn=document.getElementById('yts-'+n);
  var st=document.getElementById('ytst-'+n);
  if(btn) btn.disabled=true;
  // 로컬 업데이트
  if(url) ytLinks[n]=url; else delete ytLinks[n];
  DB.collection('settings').doc('ytlinks').set({links:ytLinks,updatedAt:firebase.firestore.FieldValue.serverTimestamp()})
    .then(function(){
      if(btn){btn.disabled=false;btn.textContent='저장됨';}
      if(st) st.textContent=url?'✓':'';
      if(inp) inp.className='yt-url-inp'+(url?' has-link':'');
      delete ytDirty[n];
      updateYtSummary();
      setTimeout(function(){if(btn)btn.textContent='저장';},1500);
    }).catch(function(e){
      if(btn){btn.disabled=false;}
      alert('저장 실패: '+e.message);
    });
}

function saveAllYt(){
  // 변경된 항목들 수집
  var inputs=document.querySelectorAll('.yt-url-inp');
  inputs.forEach(function(inp){
    var id=inp.id.replace('yti-','');
    var n=parseInt(id);
    var url=inp.value.trim();
    if(url) ytLinks[n]=url; else delete ytLinks[n];
  });
  var btn=document.querySelector('.yt-bulk-btn');
  if(btn){btn.disabled=true;btn.textContent='저장 중...';}
  DB.collection('settings').doc('ytlinks').set({links:ytLinks,updatedAt:firebase.firestore.FieldValue.serverTimestamp()})
    .then(function(){
      ytDirty={};
      updateYtSummary();
      renderYtList();
      if(btn){btn.disabled=false;btn.textContent='전체 저장';}
      alert('전체 저장 완료!');
    }).catch(function(e){
      if(btn){btn.disabled=false;btn.textContent='전체 저장';}
      alert('저장 실패: '+e.message);
    });
}

function previewYt(n){
  var url=ytLinks[n]||'';
  if(!url) return;
  var m=url.match(/(?:youtu\.be\/|v=|embed\/)([a-zA-Z0-9_-]{11})/);
  if(m) window.open('https://www.youtube.com/watch?v='+m[1],'_blank');
  else window.open(url,'_blank');
}

function doAddStudent(){
  var name=document.getElementById('add-name').value.trim();
  var email=document.getElementById('add-email').value.trim();
  var pw=document.getElementById('add-pw').value;
  var err=document.getElementById('add-err');
  var btn=document.getElementById('add-ok-btn');
  if(!name){err.textContent='이름을 입력하세요';return;}
  if(!email){err.textContent='이메일을 입력하세요';return;}
  if(pw.length<6){err.textContent='비밀번호는 6자 이상이어야 합니다';return;}
  err.textContent='계정 생성 중...';
  btn.disabled=true;

  // 현재 관리자 세션 저장
  var adminEmail=AUTH.currentUser.email;
  var adminPw=null; // 재로그인용 pw는 없으므로 Auth.createUser 후 복귀

  // 2차 auth 인스턴스로 학생 계정 생성 (관리자 세션 유지)
  var secondApp;
  try {
    secondApp = firebase.app('tempApp');
  } catch(e) {
    secondApp = firebase.initializeApp(firebase.app().options, 'tempApp');
  }
  var secondAuth = secondApp.auth();
  secondAuth.createUserWithEmailAndPassword(email, pw)
    .then(function(cred){
      var uid=cred.user.uid;
      return secondAuth.signOut().then(function(){
        return DB.collection('students').doc(email).set({
          email:email,
          name:name,
          records:{},
          createdAt:firebase.firestore.FieldValue.serverTimestamp()
        });
      }).then(function(){
        closeAddModal();
        err.textContent='';
        alert(name+'님 계정이 생성되었습니다.');
        loadStudents();
      });
    })
    .catch(function(e){
      btn.disabled=false;
      if(e.code==='auth/email-already-in-use') err.textContent='이미 사용 중인 이메일입니다';
      else if(e.code==='auth/invalid-email') err.textContent='이메일 형식이 올바르지 않습니다';
      else err.textContent='오류: '+e.message;
    });
}

function doDeleteStudent(){

  btn.disabled=true;
  err.textContent='삭제 중...';
  // Firestore 데이터 삭제 (Firebase Auth 계정은 Admin SDK 없이 클라이언트에서 삭제 불가 - DB만 삭제)
  DB.collection('students').doc(delTargetId).delete()
    .then(function(){
      closeDelModal();
      alert('학생 데이터가 삭제되었습니다.');
      loadStudents();
    })
    .catch(function(e){
      btn.disabled=false;
      err.textContent='삭제 실패: '+e.message;
    });
}
</script>
</body>
</html>
